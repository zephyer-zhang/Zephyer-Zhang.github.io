<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Flappy Bird</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            color: #00ff88;
            overflow: hidden;
            touch-action: none;
            user-select: none;
        }
        h1 {
            font-size: 32px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px #00ff88;
        }
        #gameContainer {
            position: relative;
            border: 2px solid #00ff88;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
        }
        #game {
            display: block;
            background: linear-gradient(180deg, #0d1b2a 0%, #1b263b 50%, #2d3a4a 100%);
        }
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        #score {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 48px;
            font-weight: bold;
            text-shadow: 0 0 10px #00ff88;
        }
        #best {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 16px;
            opacity: 0.7;
        }
        #startScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(10, 10, 15, 0.9);
            pointer-events: auto;
        }
        .btn {
            margin-top: 20px;
            padding: 15px 40px;
            font-size: 20px;
            background: transparent;
            border: 2px solid #00ff88;
            color: #00ff88;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            pointer-events: auto;
        }
        .btn:hover {
            background: #00ff88;
            color: #0a0a0f;
            box-shadow: 0 0 20px #00ff88;
        }
        #finalScore {
            font-size: 64px;
            font-weight: bold;
            text-shadow: 0 0 20px #00ff88;
        }
        .instructions {
            margin-top: 30px;
            font-size: 14px;
            opacity: 0.7;
            text-align: center;
        }
        @media (max-width: 500px) {
            h1 { font-size: 24px; }
            #score { font-size: 36px; }
        }
    </style>
</head>
<body>
    <h1>🐦 Flappy Bird</h1>
    <div id="gameContainer">
        <canvas id="game"></canvas>
        <div id="ui">
            <div id="score">0</div>
            <div id="best">最高: 0</div>
            <div id="startScreen">
                <div style="font-size: 24px;">移动鼠标/手指开始游戏</div>
                <div class="instructions">
                    鼠标/手指移动控制小鸟<br>
                    躲避水管，穿过缝隙得分
                </div>
            </div>
            <div id="gameOverScreen" style="display: none;">
                <div style="font-size: 24px;">游戏结束</div>
                <div id="finalScore">0</div>
                <button class="btn" id="restartBtn">再来一次</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const bestEl = document.getElementById('best');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScoreEl = document.getElementById('finalScore');
        const restartBtn = document.getElementById('restartBtn');

        const isMobile = window.innerWidth <= 500;
        canvas.width = isMobile ? 320 : 400;
        canvas.height = isMobile ? 480 : 600;

        const container = document.getElementById('gameContainer');
        const containerRect = () => container.getBoundingClientRect();

        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }
        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            switch(type) {
                case 'flap':
                    osc.frequency.setValueAtTime(400, now);
                    osc.frequency.exponentialRampToValueAtTime(600, now + 0.1);
                    gain.gain.setValueAtTime(0.12, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                    osc.start(now);
                    osc.stop(now + 0.1);
                    break;
                case 'score':
                    osc.frequency.setValueAtTime(523, now);
                    osc.frequency.setValueAtTime(659, now + 0.1);
                    osc.frequency.setValueAtTime(784, now + 0.2);
                    gain.gain.setValueAtTime(0.2, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    osc.start(now);
                    osc.stop(now + 0.3);
                    break;
                case 'hit':
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(200, now);
                    osc.frequency.exponentialRampToValueAtTime(50, now + 0.3);
                    gain.gain.setValueAtTime(0.3, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    osc.start(now);
                    osc.stop(now + 0.3);
                    break;
            }
        }

        let gameState = 'start';
        let score = 0;
        let bestScore = parseInt(localStorage.getItem('flappyBest')) || 0;
        bestEl.textContent = `最高: ${bestScore}`;

        const bird = {
            x: 80,
            y: canvas.height / 2,
            width: 34,
            height: 26,
            targetY: canvas.height / 2,
            speed: 0.04,     // 跟随速度（越小越慢）
            rotation: 0
        };

        const pipes = [];
        const pipeWidth = 60;
        const pipeGap = 170;
        const pipeSpeed = 1.8;  // 再调慢
        let pipeTimer = 0;
        const pipeInterval = 100;

        const particles = [];

        function createParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 0.5) * 6,
                    life: 30,
                    color
                });
            }
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }

        function drawParticles() {
            particles.forEach(p => {
                ctx.globalAlpha = p.life / 30;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
        }

        function resetGame() {
            bird.y = canvas.height / 2;
            bird.targetY = canvas.height / 2;
            bird.rotation = 0;
            pipes.length = 0;
            particles.length = 0;
            score = 0;
            pipeTimer = 0;
            scoreEl.textContent = '0';
            gameState = 'playing';
            startScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
        }

        function gameOver() {
            gameState = 'over';
            playSound('hit');
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('flappyBest', bestScore);
                bestEl.textContent = `最高: ${bestScore}`;
            }
            finalScoreEl.textContent = score;
            setTimeout(() => { gameOverScreen.style.display = 'flex'; }, 500);
        }

        // 获取鼠标/手指在画布上的Y坐标
        function getPointerY(e) {
            const rect = containerRect();
            if (e.touches) {
                return e.touches[0].clientY - rect.top;
            }
            return e.clientY - rect.top;
        }

        function update() {
            if (gameState !== 'playing') return;

            // 小鸟平滑跟随目标Y
            const diff = bird.targetY - bird.y;
            bird.y += diff * bird.speed;

            // 旋转角度（根据移动方向）
            bird.rotation = Math.max(-30, Math.min(30, diff * 0.8));

            // 限制边界
            if (bird.y < 0) bird.y = 0;
            if (bird.y + bird.height > canvas.height) bird.y = canvas.height - bird.height;

            // 水管
            pipeTimer++;
            if (pipeTimer >= pipeInterval) {
                const minY = 80;
                const maxY = canvas.height - pipeGap - 80;
                pipes.push({
                    x: canvas.width,
                    gapY: Math.random() * (maxY - minY) + minY,
                    passed: false
                });
                pipeTimer = 0;
            }

            for (let i = pipes.length - 1; i >= 0; i--) {
                pipes[i].x -= pipeSpeed;
                if (!pipes[i].passed && pipes[i].x + pipeWidth < bird.x) {
                    pipes[i].passed = true;
                    score++;
                    scoreEl.textContent = score;
                    playSound('score');
                    createParticles(bird.x + bird.width, bird.y, '#ffdd00', 8);
                }
                if (pipes[i].x + pipeWidth < 0) pipes.splice(i, 1);
            }

            // 碰撞
            for (const pipe of pipes) {
                if (bird.x + bird.width > pipe.x && bird.x < pipe.x + pipeWidth) {
                    if (bird.y < pipe.gapY || bird.y + bird.height > pipe.gapY + pipeGap) {
                        gameOver();
                        return;
                    }
                }
            }
            // 地面和天花板
            if (bird.y <= 0 || bird.y + bird.height >= canvas.height) {
                // 不立即死，只是限制位置
            }

            updateParticles();
        }

        function drawBird() {
            ctx.save();
            ctx.translate(bird.x + bird.width / 2, bird.y + bird.height / 2);
            ctx.rotate(bird.rotation * Math.PI / 180);

            // 身体
            ctx.fillStyle = '#ffdd00';
            ctx.beginPath();
            ctx.ellipse(0, 0, bird.width / 2, bird.height / 2, 0, 0, Math.PI * 2);
            ctx.fill();

            // 翅膀
            ctx.fillStyle = '#ff9900';
            ctx.beginPath();
            ctx.ellipse(-5, 2, 8, 5, -0.3, 0, Math.PI * 2);
            ctx.fill();

            // 眼睛
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(8, -4, 6, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(10, -4, 3, 0, Math.PI * 2);
            ctx.fill();

            // 嘴
            ctx.fillStyle = '#ff6600';
            ctx.beginPath();
            ctx.moveTo(15, 0);
            ctx.lineTo(22, 3);
            ctx.lineTo(15, 6);
            ctx.closePath();
            ctx.fill();

            ctx.restore();
        }

        function drawPipe(pipe) {
            const gradient = ctx.createLinearGradient(pipe.x, 0, pipe.x + pipeWidth, 0);
            gradient.addColorStop(0, '#2d5a27');
            gradient.addColorStop(0.5, '#4a9c3f');
            gradient.addColorStop(1, '#2d5a27');

            ctx.fillStyle = gradient;
            ctx.fillRect(pipe.x, 0, pipeWidth, pipe.gapY);
            ctx.fillRect(pipe.x - 5, pipe.gapY - 30, pipeWidth + 10, 30);

            ctx.fillStyle = gradient;
            ctx.fillRect(pipe.x, pipe.gapY + pipeGap, pipeWidth, canvas.height - pipe.gapY - pipeGap);
            ctx.fillRect(pipe.x - 5, pipe.gapY + pipeGap, pipeWidth + 10, 30);
        }

        function draw() {
            const bgGradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            bgGradient.addColorStop(0, '#0d1b2a');
            bgGradient.addColorStop(0.5, '#1b263b');
            bgGradient.addColorStop(1, '#2d3a4a');
            ctx.fillStyle = bgGradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 星星
            ctx.fillStyle = '#fff';
            for (let i = 0; i < 30; i++) {
                const x = (i * 73) % canvas.width;
                const y = (i * 51) % (canvas.height / 2);
                const size = (i % 3) + 1;
                ctx.globalAlpha = 0.3 + (i % 5) * 0.1;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;

            pipes.forEach(drawPipe);
            drawBird();
            drawParticles();

            // 地面线
            ctx.strokeStyle = '#00ff88';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, canvas.height - 2);
            ctx.lineTo(canvas.width, canvas.height - 2);
            ctx.stroke();
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // 鼠标/触屏移动 → 更新小鸟目标位置
        function onPointerMove(e) {
            if (gameState === 'start') {
                initAudio();
                resetGame();
            }
            const y = getPointerY(e);
            if (!isNaN(y)) {
                bird.targetY = Math.max(0, Math.min(canvas.height - bird.height, y - bird.height / 2));
            }
        }

        // 鼠标
        document.addEventListener('mousemove', onPointerMove);
        // 触屏
        document.addEventListener('touchmove', e => {
            e.preventDefault();
            onPointerMove(e);
        }, { passive: false });
        document.addEventListener('touchstart', e => {
            e.preventDefault();
            onPointerMove(e);
        }, { passive: false });

        restartBtn.addEventListener('click', () => resetGame());

        gameLoop();
    </script>
</body>
</html>
