<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MINESWEEPER // 暗黑科技</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#00ff88;font-family:'Courier New',monospace;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:10px;padding-bottom:80px;overflow-x:hidden}
h1{font-size:1.6rem;letter-spacing:6px;text-shadow:0 0 15px #00ff88,0 0 30px #00ff8844;margin:8px 0}
.info{display:flex;gap:16px;margin:8px 0;flex-wrap:wrap;justify-content:center}
.info .stat{background:rgba(0,255,136,0.05);border:1px solid #00ff8844;border-radius:6px;padding:6px 14px;font-size:1rem}
.info .stat span{color:#00ff88;text-shadow:0 0 6px #00ff88}
.btn{background:transparent;border:1px solid #00ff88;color:#00ff88;padding:6px 14px;border-radius:4px;cursor:pointer;font-family:inherit;font-size:0.85rem;margin:2px;transition:all .2s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.btn:hover{background:rgba(0,255,136,0.2);box-shadow:0 0 10px #00ff8844}
.btn.active{background:rgba(0,255,136,0.25);box-shadow:0 0 8px #00ff88}
.btn:active{background:rgba(0,255,136,0.35);transform:scale(0.97)}
.btn-row{display:flex;gap:4px;justify-content:center;flex-wrap:wrap;margin:8px 0}
.diff-row{display:flex;gap:6px;justify-content:center;margin:6px 0}
#board{display:inline-grid;gap:1px;background:rgba(0,255,136,0.1);border:2px solid #00ff88;box-shadow:0 0 20px rgba(0,255,136,0.3);padding:2px;border-radius:4px;margin:6px 0;touch-action:manipulation}
.cell{width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-size:0.85rem;font-weight:bold;border-radius:2px;cursor:pointer;user-select:none;transition:all .1s;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.cell.hidden{background:rgba(0,255,136,0.08);border:1px solid rgba(0,255,136,0.2)}
.cell.hidden:hover{background:rgba(0,255,136,0.18);box-shadow:0 0 6px #00ff8844}
.cell.revealed{background:rgba(0,0,0,0.4);border:1px solid rgba(0,255,136,0.08)}
.cell.mine{background:rgba(255,0,0,0.3);border-color:rgba(255,0,0,0.5)}
.cell.flagged{background:rgba(255,170,0,0.15);border-color:rgba(255,170,0,0.4)}
.cell.boom{background:rgba(255,0,0,0.6);border-color:#ff0000;animation:pulse .3s}
.n1{color:#00ccff}.n2{color:#00ff88}.n3{color:#ff4444}.n4{color:#8844ff}
.n5{color:#ff8800}.n6{color:#00cccc}.n7{color:#ff00ff}.n8{color:#888}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);display:none;justify-content:center;align-items:center;z-index:100;flex-direction:column;gap:16px}
.overlay h2{font-size:1.8rem;text-shadow:0 0 20px #00ff88}
.overlay.win h2{color:#ffd700;text-shadow:0 0 20px #ffd700}
.overlay .score{font-size:1.2rem;color:#ffd700}
.controls{font-size:0.75rem;color:#00ff8888;text-align:center;line-height:1.6;margin-top:4px}
.controls kbd{background:rgba(0,255,136,0.15);border:1px solid #00ff8844;border-radius:3px;padding:1px 6px;color:#00ff88}

/* Bottom action bar - mobile only */
.mobile-bar{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,15,0.97);border-top:1px solid #00ff8844;padding:10px 12px;z-index:50;justify-content:center;align-items:center;gap:12px;box-shadow:0 -4px 20px rgba(0,255,136,0.15);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.mobile-bar .mbtn{flex:1;max-width:160px;padding:12px 8px;font-size:0.95rem;letter-spacing:1px;display:flex;align-items:center;justify-content:center;gap:6px}
.mobile-bar .mbtn.primary{background:rgba(0,255,136,0.15);border:1px solid #00ff88;color:#00ff88}
.mobile-bar .mbtn.secondary{background:rgba(0,255,136,0.05);border:1px solid #00ff8844;color:#00ff88}
.mobile-bar .mbtn:active{background:rgba(0,255,136,0.3)}
.mobile-bar .mbtn.active{background:rgba(255,170,0,0.2);border-color:rgba(255,170,0,0.6);color:#ffcc44}

@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
@media(max-width:600px){
  .cell{width:36px;height:36px;font-size:0.9rem;min-width:36px;min-height:36px}
  #board{grid-template-columns:repeat(auto-fill,36px)}
  .mobile-bar{display:flex}
  .controls{display:none}
  body{padding-bottom:80px}
}
</style>
</head>
<body>
<h1>▸ MINESWEEPER ◂</h1>
<div class="diff-row">
  <button class="btn" onclick="window.setDiff(0)">简单 9×9</button>
  <button class="btn" onclick="window.setDiff(1)">中等 16×16</button>
  <button class="btn" onclick="window.setDiff(2)">困难 30×16</button>
</div>
<div class="info">
  <div class="stat">💣 <span id="mineCount">10</span></div>
  <div class="stat">🚩 <span id="flagCount">0</span></div>
  <div class="stat">⏱ <span id="timer">0</span>s</div>
  <div class="stat">🏆 <span id="best">-</span></div>
</div>
<div id="board"></div>
<div class="btn-row" id="desktopControls">
  <button class="btn" onclick="window.newGame()">新游戏</button>
  <button class="btn" id="flagBtn" onclick="window.toggleFlagMode()">🚩 标记模式</button>
</div>
<div class="controls">
  <kbd>左键</kbd> 翻开 &nbsp; <kbd>右键</kbd> 标旗 &nbsp; <kbd>F</kbd> 切换标记模式 &nbsp; <kbd>R</kbd> 重新开始
</div>

<!-- Mobile bottom bar -->
<div class="mobile-bar">
  <button class="mbtn primary" id="mRevealBtn" ontouchstart="window._mTouch(event,'reveal')" onclick="window._mRevealTap()">👆 翻开</button>
  <button class="mbtn secondary" id="mFlagBtn" ontouchstart="window._mTouch(event,'flag')" onclick="window._mFlagTap()">🚩 标旗</button>
  <button class="mbtn secondary" ontouchstart="window.newGame()">🔄 重开</button>
</div>

<div class="overlay" id="result">
  <h2 id="resultTitle">GAME OVER</h2>
  <div class="score" id="resultMsg"></div>
  <button class="btn" onclick="window.newGame()">再来一局</button>
</div>

<script>
(function(){
'use strict';

var DIFFS=[
  {rows:9,cols:9,mines:10,name:'easy'},
  {rows:16,cols:16,mines:40,name:'medium'},
  {rows:16,cols:30,mines:99,name:'hard'}
];
var diff=0,rows,cols,mineTotal,grid,revealed,flagged,gameOver,gameWon,flagMode,timerVal,timerRef,firstClick;

// Mobile mode tracking
var mobileMode = false;
var lastMTouchTime = 0;

function detectMobile(){
  mobileMode = window.matchMedia('(max-width:600px)').matches;
}
detectMobile();
window.matchMedia('(max-width:600px)').addEventListener('change', detectMobile);

// ========== AUDIO ENGINE ==========
var AC = null;
function getAC(){
  if(!AC) AC = new (window.AudioContext || window.webkitAudioContext)();
  if(AC.state === 'suspended') AC.resume();
  return AC;
}

function sfxRevealEmpty(){
  try {
    var ac = getAC();
    var ctx = ac;
    var g = ctx.createGain();
    g.gain.setValueAtTime(0.22, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
    g.connect(ctx.destination);
    var osc = ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(1200, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.08);
    osc.connect(g);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.08);
  } catch(e){}
}

function sfxRevealNumber(n){
  if(n < 1 || n > 8) return;
  try {
    var ac = getAC();
    var ctx = ac;
    // Frequencies from C4 to C5, 8 notes for 1-8
    var freqs = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88, 523.25];
    var freq = freqs[n - 1];
    var g = ctx.createGain();
    g.gain.setValueAtTime(0.18, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
    g.connect(ctx.destination);
    var osc = ctx.createOscillator();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    osc.connect(g);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.15);
  } catch(e){}
}

function sfxFlag(){
  try {
    var ac = getAC();
    var ctx = ac;
    var g = ctx.createGain();
    g.gain.setValueAtTime(0.15, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
    g.connect(ctx.destination);
    [880, 1100].forEach(function(freq, i){
      var osc = ctx.createOscillator();
      osc.type = 'square';
      osc.frequency.setValueAtTime(freq, ctx.currentTime + i * 0.04);
      osc.connect(g);
      osc.start(ctx.currentTime + i * 0.04);
      osc.stop(ctx.currentTime + 0.12);
    });
  } catch(e){}
}

function sfxMine(){
  try {
    var ac = getAC();
    var ctx = ac;
    // Noise
    var bufLen = ctx.sampleRate * 0.4;
    var buf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
    var data = buf.getChannelData(0);
    for(var i = 0; i < bufLen; i++) data[i] = Math.random() * 2 - 1;
    var noise = ctx.createBufferSource();
    noise.buffer = buf;
    var ng = ctx.createGain();
    ng.gain.setValueAtTime(0.5, ctx.currentTime);
    ng.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
    noise.connect(ng);
    ng.connect(ctx.destination);
    noise.start(ctx.currentTime);
    // Low boom oscillator
    var g = ctx.createGain();
    g.gain.setValueAtTime(0.45, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.35);
    g.connect(ctx.destination);
    var osc = ctx.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(150, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(30, ctx.currentTime + 0.35);
    osc.connect(g);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.4);
  } catch(e){}
}

function sfxVictory(){
  try {
    var ac = getAC();
    var ctx = ac;
    // Ascending scale: C4-E4-G4-C5-E5-G5
    var notes = [261.63, 329.63, 392.00, 523.25, 659.25, 783.99];
    notes.forEach(function(freq, i){
      var t = ctx.currentTime + i * 0.1;
      var g = ctx.createGain();
      g.gain.setValueAtTime(0.2, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
      g.connect(ctx.destination);
      var osc = ctx.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, t);
      osc.connect(g);
      osc.start(t);
      osc.stop(t + 0.35);
    });
  } catch(e){}
}

// ========== GAME LOGIC ==========
function init(){
  var d=DIFFS[diff];rows=d.rows;cols=d.cols;mineTotal=d.mines;
  grid=[];revealed=[];flagged=[];
  for(var r=0;r<rows;r++){
    grid[r]=new Array(cols).fill(0);
    revealed[r]=new Array(cols).fill(false);
    flagged[r]=new Array(cols).fill(false);
  }
  gameOver=false;gameWon=false;flagMode=false;firstClick=true;
  if(timerRef)clearInterval(timerRef);timerVal=0;timerRef=null;
  document.getElementById('timer').textContent='0';
  document.getElementById('flagCount').textContent='0';
  document.getElementById('mineCount').textContent=mineTotal;
  document.getElementById('result').style.display='none';
  document.getElementById('flagBtn').classList.remove('active');
  document.getElementById('mFlagBtn').classList.remove('active');
  document.getElementById('mRevealBtn').classList.add('primary');
  document.getElementById('mRevealBtn').classList.remove('active');
  var b=localStorage.getItem('msBest_'+DIFFS[diff].name);
  document.getElementById('best').textContent=b||'-';
  renderBoard();
}

function placeMines(sr,sc){
  var placed=0;
  while(placed<mineTotal){
    var r=Math.floor(Math.random()*rows),c=Math.floor(Math.random()*cols);
    if(Math.abs(r-sr)<=1&&Math.abs(c-sc)<=1)continue;
    if(grid[r][c]===-1)continue;
    grid[r][c]=-1;placed++;
  }
  for(var r=0;r<rows;r++)for(var c=0;c<cols;c++){
    if(grid[r][c]===-1)continue;
    var cnt=0;
    for(var dr=-1;dr<=1;dr++)for(var dc=-1;dc<=1;dc++){
      var nr=r+dr,nc=c+dc;
      if(nr>=0&&nr<rows&&nc>=0&&nc<cols&&grid[nr][nc]===-1)cnt++;
    }
    grid[r][c]=cnt;
  }
}

function renderBoard(){
  var b=document.getElementById('board');
  b.innerHTML='';
  b.style.gridTemplateColumns='repeat('+cols+',30px)';
  for(var r=0;r<rows;r++)for(var c=0;c<cols;c++){
    var cell=document.createElement('div');
    cell.className='cell hidden';
    cell.dataset.r=r;cell.dataset.c=c;
    cell.addEventListener('click',onLeft);
    cell.addEventListener('contextmenu',onRight);
    var lpt=null;
    cell.addEventListener('touchstart',function(e){
      var t=this;
      lpt=setTimeout(function(){flagCell(+t.dataset.r,+t.dataset.c);lpt=null;},400);
    });
    cell.addEventListener('touchend',function(){if(lpt){clearTimeout(lpt);lpt=null;}});
    cell.addEventListener('touchmove',function(){if(lpt){clearTimeout(lpt);lpt=null;}});
    b.appendChild(cell);
  }
}

function getCell(r,c){return document.getElementById('board').children[r*cols+c];}

function onLeft(e){
  e.preventDefault();
  var r=+this.dataset.r,c=+this.dataset.c;
  if(flagMode){flagCell(r,c);return;}
  if(gameOver||flagged[r][c]||revealed[r][c])return;
  if(firstClick){placeMines(r,c);firstClick=false;startTimer();}
  revealCell(r,c);
}

function onRight(e){
  e.preventDefault();
  var r=+this.dataset.r,c=+this.dataset.c;
  if(gameOver||revealed[r][c])return;
  flagCell(r,c);
}

function flagCell(r,c){
  if(gameOver||revealed[r][c])return;
  flagged[r][c]=!flagged[r][c];
  var cell=getCell(r,c);
  cell.classList.toggle('flagged',flagged[r][c]);
  cell.textContent=flagged[r][c]?'🚩':'';
  document.getElementById('flagCount').textContent=document.querySelectorAll('.cell.flagged').length;
  if(flagged[r][c]) sfxFlag();
}

function revealCell(r,c){
  if(r<0||r>=rows||c<0||c>=cols||revealed[r][c]||flagged[r][c])return;
  revealed[r][c]=true;
  var cell=getCell(r,c);
  cell.classList.remove('hidden');
  cell.classList.add('revealed');
  if(grid[r][c]===-1){
    cell.classList.add('boom');cell.textContent='💣';
    sfxMine();
    endGame(false);return;
  }
  if(grid[r][c]>0){
    cell.textContent=grid[r][c];
    cell.classList.add('n'+grid[r][c]);
    sfxRevealNumber(grid[r][c]);
  }else{
    sfxRevealEmpty();
    for(var dr=-1;dr<=1;dr++)for(var dc=-1;dc<=1;dc++){
      if(dr===0&&dc===0)continue;
      revealCell(r+dr,c+dc);
    }
  }
  checkWin();
}

function chordReveal(r,c){
  if(!revealed[r][c]||grid[r][c]<=0)return;
  var flagCnt=0;
  for(var dr=-1;dr<=1;dr++)for(var dc=-1;dc<=1;dc++){
    var nr=r+dr,nc=c+dc;
    if(nr>=0&&nr<rows&&nc>=0&&nc<cols&&flagged[nr][nc])flagCnt++;
  }
  if(flagCnt!==grid[r][c])return;
  for(var dr=-1;dr<=1;dr++)for(var dc=-1;dc<=1;dc++){
    var nr=r+dr,nc=c+dc;
    if(nr>=0&&nr<rows&&nc>=0&&nc<cols)revealCell(nr,nc);
  }
}

function checkWin(){
  var cnt=0;
  for(var r=0;r<rows;r++)for(var c=0;c<cols;c++)if(!revealed[r][c])cnt++;
  if(cnt===mineTotal)endGame(true);
}

function endGame(won){
  gameOver=true;gameWon=won;
  if(timerRef)clearInterval(timerRef);
  if(!won){
    for(var r=0;r<rows;r++)for(var c=0;c<cols;c++){
      if(grid[r][c]===-1&&!revealed[r][c]){
        var cell=getCell(r,c);
        cell.classList.remove('hidden','flagged');
        cell.classList.add('revealed','mine');
        cell.textContent='💣';
      }
    }
  }else{
    sfxVictory();
    for(var r=0;r<rows;r++)for(var c=0;c<cols;c++){
      if(grid[r][c]===-1&&!flagged[r][c]){flagged[r][c]=true;var cell=getCell(r,c);cell.classList.add('flagged');cell.textContent='🚩';}
    }
    document.getElementById('flagCount').textContent=mineTotal;
    var key='msBest_'+DIFFS[diff].name;
    var prev=parseInt(localStorage.getItem(key));
    if(!prev||timerVal<prev){localStorage.setItem(key,timerVal);document.getElementById('best').textContent=timerVal;}
  }
  var overlay=document.getElementById('result');
  overlay.className='overlay'+(won?' win':'');
  document.getElementById('resultTitle').textContent=won?'🎉 YOU WIN!':'GAME OVER';
  document.getElementById('resultMsg').textContent=won?'用时 '+timerVal+' 秒':'踩到地雷了 💥';
  overlay.style.display='flex';
}

function startTimer(){
  timerRef=setInterval(function(){timerVal++;document.getElementById('timer').textContent=timerVal;},1000);
}

function setDiff(d){
  diff=d;
  document.querySelectorAll('.diff-row .btn').forEach(function(b,i){b.classList.toggle('active',i===d);});
  init();
}

function newGame(){init();}
function toggleFlagMode(){
  flagMode=!flagMode;
  document.getElementById('flagBtn').classList.toggle('active',flagMode);
  document.getElementById('mFlagBtn').classList.toggle('active',flagMode);
  document.getElementById('mRevealBtn').classList.toggle('primary',!flagMode);
}

// Mobile: touch handler for bottom bar buttons
window._mTouch = function(e, mode){
  e.preventDefault();
  if(mode === 'reveal'){
    flagMode = false;
    document.getElementById('flagBtn').classList.remove('active');
    document.getElementById('mFlagBtn').classList.remove('active');
    document.getElementById('mRevealBtn').classList.add('primary');
    document.getElementById('mRevealBtn').classList.remove('active');
  } else if(mode === 'flag'){
    flagMode = true;
    document.getElementById('flagBtn').classList.add('active');
    document.getElementById('mFlagBtn').classList.add('active');
    document.getElementById('mRevealBtn').classList.remove('primary');
    document.getElementById('mRevealBtn').classList.add('active');
  }
};

window._mRevealTap = function(){
  var now = Date.now();
  if(now - lastMTouchTime < 300) return;
  lastMTouchTime = now;
  flagMode = false;
  document.getElementById('flagBtn').classList.remove('active');
  document.getElementById('mFlagBtn').classList.remove('active');
  document.getElementById('mRevealBtn').classList.add('primary');
  document.getElementById('mRevealBtn').classList.remove('active');
};

window._mFlagTap = function(){
  var now = Date.now();
  if(now - lastMTouchTime < 300) return;
  lastMTouchTime = now;
  flagMode = !flagMode;
  document.getElementById('flagBtn').classList.toggle('active',flagMode);
  document.getElementById('mFlagBtn').classList.toggle('active',flagMode);
  if(flagMode){
    document.getElementById('mRevealBtn').classList.remove('primary');
    document.getElementById('mRevealBtn').classList.add('active');
  } else {
    document.getElementById('mRevealBtn').classList.add('primary');
    document.getElementById('mRevealBtn').classList.remove('active');
  }
};

document.addEventListener('keydown',function(e){
  if(e.key==='f'||e.key==='F')toggleFlagMode();
  if(e.key==='r'||e.key==='R')newGame();
});

document.getElementById('board').addEventListener('dblclick',function(e){
  var cell=e.target.closest('.cell');
  if(!cell)return;
  var r=+cell.dataset.r,c=+cell.dataset.c;
  if(revealed[r][c])chordReveal(r,c);
});

window.setDiff=setDiff;
window.newGame=newGame;
window.toggleFlagMode=toggleFlagMode;

init();
})();
</script>
</body>
</html>
