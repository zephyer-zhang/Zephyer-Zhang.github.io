<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇 - Zephyr</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            color: #00ff88;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { text-shadow: 0 0 10px #00ff88, 0 0 20px #00ff88; }
            50% { text-shadow: 0 0 20px #00ff88, 0 0 30px #00ff88, 0 0 40px #00ff88; }
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .stats {
            display: flex;
            gap: 30px;
            margin-bottom: 20px;
            font-size: 1.2rem;
        }

        .stat {
            background: rgba(0, 255, 136, 0.1);
            padding: 10px 20px;
            border: 1px solid #00ff88;
            border-radius: 5px;
        }

        #gameCanvas {
            border: 2px solid #00ff88;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
            background: #000;
        }

        .controls {
            margin-top: 20px;
            text-align: center;
            color: #888;
            font-size: 0.9rem;
        }

        .btn {
            background: transparent;
            color: #00ff88;
            border: 1px solid #00ff88;
            padding: 10px 20px;
            margin: 10px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .btn:hover {
            background: #00ff88;
            color: #0a0a0a;
            box-shadow: 0 0 20px #00ff88;
        }

        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            border: 2px solid #00ff88;
            padding: 40px;
            text-align: center;
            display: none;
            z-index: 1000;
        }

        .game-over h2 {
            font-size: 2rem;
            margin-bottom: 20px;
            color: #ff0088;
            animation: glow-red 2s ease-in-out infinite;
        }

        @keyframes glow-red {
            0%, 100% { text-shadow: 0 0 10px #ff0088; }
            50% { text-shadow: 0 0 20px #ff0088, 0 0 30px #ff0088; }
        }

        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00ff88;
            text-decoration: none;
            border: 1px solid #00ff88;
            padding: 10px 20px;
            transition: all 0.3s;
        }

        .back-link:hover {
            background: #00ff88;
            color: #0a0a0a;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← 返回作品集</a>
    
    <div class="header">
        <h1>🐍 贪吃蛇</h1>
    </div>

    <div class="stats">
        <div class="stat">得分: <span id="score">0</span></div>
        <div class="stat">最高分: <span id="highScore">0</span></div>
    </div>

    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <div class="controls">
        <p>使用 ↑ ↓ ← → 控制方向 | 空格键 暂停</p>
        <button class="btn" onclick="startGame()">开始游戏</button>
        <button class="btn" onclick="togglePause()">暂停/继续</button>
    </div>

    <div class="game-over" id="gameOver">
        <h2>游戏结束!</h2>
        <p style="font-size: 1.5rem; margin: 20px 0;">最终得分: <span id="finalScore">0</span></p>
        <button class="btn" onclick="restartGame()">重新开始</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [{ x: 10, y: 10 }];
        let food = { x: 15, y: 15 };
        let dx = 0;
        let dy = 0;
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameLoop;
        let isPaused = false;
        let gameStarted = false;

        document.getElementById('highScore').textContent = highScore;

        // 键盘控制
        document.addEventListener('keydown', changeDirection);

        function changeDirection(event) {
            const key = event.key;
            
            if (key === ' ' || key === 'Spacebar') {
                togglePause();
                return;
            }

            // 防止反向移动
            if ((key === 'ArrowUp' || key === 'w') && dy === 0) {
                dx = 0; dy = -1;
                if (!gameStarted) startGame();
            }
            if ((key === 'ArrowDown' || key === 's') && dy === 0) {
                dx = 0; dy = 1;
                if (!gameStarted) startGame();
            }
            if ((key === 'ArrowLeft' || key === 'a') && dx === 0) {
                dx = -1; dy = 0;
                if (!gameStarted) startGame();
            }
            if ((key === 'ArrowRight' || key === 'd') && dx === 0) {
                dx = 1; dy = 0;
                if (!gameStarted) startGame();
            }
        }

        function startGame() {
            if (gameStarted) return;
            gameStarted = true;
            dx = 1; dy = 0;
            gameLoop = setInterval(update, 100);
        }

        function togglePause() {
            if (!gameStarted) return;
            isPaused = !isPaused;
            if (isPaused) {
                clearInterval(gameLoop);
            } else {
                gameLoop = setInterval(update, 100);
            }
        }

        function update() {
            // 移动蛇头
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // 检查碰撞
            if (head.x < 0 || head.x >= tileCount || 
                head.y < 0 || head.y >= tileCount ||
                snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                gameOver();
                return;
            }

            snake.unshift(head);

            // 检查是否吃到食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').textContent = score;
                generateFood();
            } else {
                snake.pop();
            }

            draw();
        }

        function draw() {
            // 清空画布
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制网格
            ctx.strokeStyle = '#0a3a0a';
            for (let i = 0; i < tileCount; i++) {
                for (let j = 0; j < tileCount; j++) {
                    ctx.strokeRect(i * gridSize, j * gridSize, gridSize, gridSize);
                }
            }

            // 绘制蛇
            snake.forEach((segment, index) => {
                ctx.fillStyle = index === 0 ? '#00ff88' : '#00cc66';
                ctx.fillRect(segment.x * gridSize, segment.y * gridSize, gridSize - 2, gridSize - 2);
                
                // 蛇头眼睛
                if (index === 0) {
                    ctx.fillStyle = '#000';
                    const eyeSize = 3;
                    const offsetX = dx === 1 ? 12 : dx === -1 ? 4 : 6;
                    const offsetY = dy === 1 ? 12 : dy === -1 ? 4 : 6;
                    ctx.fillRect(segment.x * gridSize + offsetX, segment.y * gridSize + offsetY, eyeSize, eyeSize);
                    ctx.fillRect(segment.x * gridSize + offsetX + (dx === 0 ? 6 : 0), segment.y * gridSize + offsetY + (dy === 0 ? 6 : 0), eyeSize, eyeSize);
                }
            });

            // 绘制食物
            ctx.fillStyle = '#ff0088';
            ctx.beginPath();
            ctx.arc(food.x * gridSize + gridSize / 2, food.y * gridSize + gridSize / 2, gridSize / 2 - 2, 0, Math.PI * 2);
            ctx.fill();
        }

        function generateFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
            } while (snake.some(segment => segment.x === food.x && segment.y === food.y));
        }

        function gameOver() {
            clearInterval(gameLoop);
            gameStarted = false;
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
            }

            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').style.display = 'block';
        }

        function restartGame() {
            snake = [{ x: 10, y: 10 }];
            dx = 0;
            dy = 0;
            score = 0;
            document.getElementById('score').textContent = score;
            document.getElementById('gameOver').style.display = 'none';
            generateFood();
            draw();
        }

        // 初始绘制
        generateFood();
        draw();
    </script>
</body>
</html>
