<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>жґИжґИдєР ¬Ј жЪЧйїСзІСжКА</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
  body {
    background: #08080f;
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }
  .game-container {
    background: linear-gradient(145deg, #0d0d1a, #12121f);
    border-radius: 20px;
    padding: 20px;
    border: 1px solid rgba(0,200,255,0.15);
    box-shadow: 0 0 40px rgba(0,150,255,0.1), inset 0 0 60px rgba(0,100,255,0.03);
    position: relative;
  }
  .game-container::before {
    content: '';
    position: absolute;
    top: -1px; left: 30%; right: 30%;
    height: 2px;
    background: linear-gradient(90deg, transparent, #00c8ff, transparent);
    border-radius: 50%;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 5px 15px 5px;
  }
  .title {
    color: #00c8ff;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 3px;
    text-shadow: 0 0 15px rgba(0,200,255,0.4);
  }
  .score-area {
    display: flex;
    gap: 20px;
    align-items: center;
  }
  .score-box {
    text-align: right;
  }
  .score-label {
    color: rgba(255,255,255,0.4);
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .score-value {
    color: #fff;
    font-size: 24px;
    font-weight: 700;
    text-shadow: 0 0 10px rgba(0,200,255,0.3);
  }
  .combo-display {
    position: absolute;
    top: 65px;
    right: 25px;
    color: #ff6b35;
    font-size: 28px;
    font-weight: 900;
    text-shadow: 0 0 20px rgba(255,107,53,0.7);
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    transform: scale(0.5);
    pointer-events: none;
    z-index: 10;
  }
  .combo-display.show {
    opacity: 1;
    transform: scale(1);
  }

  #board {
    display: grid;
    gap: 3px;
    padding: 8px;
    background: rgba(255,255,255,0.03);
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.05);
    position: relative;
  }

  .cell {
    width: 52px;
    height: 52px;
    border-radius: 10px;
    cursor: pointer;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    transition: transform 0.12s, box-shadow 0.12s;
  }
  .cell:active { transform: scale(0.92); }

  .gem {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: bold;
    transition: all 0.15s;
    cursor: pointer;
  }

  /* Gem colors - cyber/neon theme */
  .gem-0 { /* Cyan */
    background: linear-gradient(135deg, #00d4ff, #0098cc);
    box-shadow: 0 0 12px rgba(0,212,255,0.4), inset 0 0 15px rgba(255,255,255,0.15);
    color: #e0f8ff;
  }
  .gem-1 { /* Magenta */
    background: linear-gradient(135deg, #ff44dd, #cc22aa);
    box-shadow: 0 0 12px rgba(255,68,221,0.4), inset 0 0 15px rgba(255,255,255,0.15);
    color: #ffe0f8;
  }
  .gem-2 { /* Lime */
    background: linear-gradient(135deg, #44ff88, #22cc66);
    box-shadow: 0 0 12px rgba(68,255,136,0.4), inset 0 0 15px rgba(255,255,255,0.15);
    color: #e0ffe8;
  }
  .gem-3 { /* Orange */
    background: linear-gradient(135deg, #ff8833, #dd6611);
    box-shadow: 0 0 12px rgba(255,136,51,0.4), inset 0 0 15px rgba(255,255,255,0.15);
    color: #fff0e0;
  }
  .gem-4 { /* Purple */
    background: linear-gradient(135deg, #aa55ff, #7733cc);
    box-shadow: 0 0 12px rgba(170,85,255,0.4), inset 0 0 15px rgba(255,255,255,0.15);
    color: #eee0ff;
  }
  .gem-5 { /* Gold */
    background: linear-gradient(135deg, #ffdd44, #ccaa22);
    box-shadow: 0 0 12px rgba(255,221,68,0.4), inset 0 0 15px rgba(255,255,255,0.15);
    color: #fff8e0;
  }

  .cell.selected .gem {
    transform: scale(1.15);
    box-shadow: 0 0 25px currentColor, 0 0 50px currentColor !important;
    border: 2px solid #fff;
  }

  .gem.dropping {
    animation: dropIn 0.25s ease-out;
  }
  @keyframes dropIn {
    0% { transform: translateY(-60px); opacity: 0.5; }
    60% { transform: translateY(4px); }
    100% { transform: translateY(0); opacity: 1; }
  }

  /* Particle canvas overlay */
  #particles {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 5;
    border-radius: 12px;
  }

  /* Bottom controls */
  .controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 15px;
    gap: 10px;
  }
  .hint-area {
    color: rgba(255,255,255,0.3);
    font-size: 13px;
    letter-spacing: 0.5px;
  }
  .btn {
    background: rgba(0,200,255,0.1);
    border: 1px solid rgba(0,200,255,0.25);
    color: #00c8ff;
    padding: 8px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
    letter-spacing: 1px;
  }
  .btn:hover {
    background: rgba(0,200,255,0.2);
    box-shadow: 0 0 15px rgba(0,200,255,0.2);
  }
  .btn:active { transform: scale(0.95); }

  /* Footer back link */
  .footer {
    text-align: center;
    padding-top: 12px;
  }
  .footer a {
    color: rgba(255,255,255,0.2);
    font-size: 12px;
    text-decoration: none;
    letter-spacing: 1px;
  }
  .footer a:hover { color: rgba(0,200,255,0.5); }

  /* Responsive */
  @media (max-width: 500px) {
    .game-container { padding: 12px; border-radius: 14px; }
    .cell { width: 38px; height: 38px; }
    .gem { width: 32px; height: 32px; font-size: 16px; border-radius: 7px; }
    #board { gap: 2px; padding: 5px; }
    .title { font-size: 17px; }
    .score-value { font-size: 18px; }
    .score-box { text-align: center; }
  }
  @media (max-width: 370px) {
    .cell { width: 32px; height: 32px; }
    .gem { width: 27px; height: 27px; font-size: 13px; }
    #board { gap: 2px; padding: 4px; }
    .title { font-size: 14px; }
    .score-value { font-size: 15px; }
  }
</style>
</head>
<body>

<div class="game-container">
  <div class="header">
    <div class="title">вЬ¶ жґИжґИдєР</div>
    <div class="score-area">
      <div class="score-box">
        <div class="score-label">еИЖжХ∞</div>
        <div class="score-value" id="score">0</div>
      </div>
    </div>
  </div>

  <div style="position:relative">
    <div id="board"></div>
    <canvas id="particles"></canvas>
  </div>

  <div class="combo-display" id="comboDisplay">COMBO!</div>

  <div class="controls">
    <span class="hint-area" id="hint">зВєеЗїзЫЄйВїжЦєеЭЧдЇ§жНҐ</span>
    <button class="btn" id="shuffleBtn">вЗД йЗНжОТ</button>
  </div>
  <div class="footer">
    <a href="index.html">вЖР ињФеЫЮдЄїй°µ</a>
  </div>
</div>

<script>
// ===== CONFIG =====
const ROWS = 8;
const COLS = 8;
const GEM_TYPES = 6;
const ANIMATION_SPEED = 180; // ms per step

// ===== STATE =====
let grid = [];
let score = 0;
let selected = null; // { row, col }
let isAnimating = false;
let comboCount = 0;

// ===== DOM =====
const boardEl = document.getElementById('board');
const scoreEl = document.getElementById('score');
const comboDisplay = document.getElementById('comboDisplay');
const hintEl = document.getElementById('hint');
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');

// ===== INIT =====
function createEmptyGrid() {
  return Array.from({ length: ROWS }, () => Array(COLS).fill(0));
}

function randomGem() {
  return Math.floor(Math.random() * GEM_TYPES);
}

function hasMatch(g) {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS - 2; c++) {
      if (g[r][c] === g[r][c+1] && g[r][c] === g[r][c+2] && g[r][c] !== -1) return true;
    }
  }
  for (let c = 0; c < COLS; c++) {
    for (let r = 0; r < ROWS - 2; r++) {
      if (g[r][c] === g[r+1][c] && g[r][c] === g[r+2][c] && g[r][c] !== -1) return true;
    }
  }
  return false;
}

function generateGrid() {
  grid = createEmptyGrid();
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      grid[r][c] = randomGem();
    }
  }
  // Remove initial matches by regeneration
  while (hasMatch(grid)) {
    const matches = findAllMatches(grid);
    for (const m of matches) {
      grid[m.r][m.c] = randomGem();
    }
  }
}

function findAllMatches(g) {
  const matched = new Set();
  // Horizontal
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS - 2; c++) {
      if (g[r][c] !== -1 && g[r][c] === g[r][c+1] && g[r][c] === g[r][c+2]) {
        let end = c + 2;
        while (end + 1 < COLS && g[r][end+1] === g[r][c]) end++;
        for (let k = c; k <= end; k++) matched.add(`${r},${k}`);
      }
    }
  }
  // Vertical
  for (let c = 0; c < COLS; c++) {
    for (let r = 0; r < ROWS - 2; r++) {
      if (g[r][c] !== -1 && g[r][c] === g[r+1][c] && g[r][c] === g[r+2][c]) {
        let end = r + 2;
        while (end + 1 < ROWS && g[end+1][c] === g[r][c]) end++;
        for (let k = r; k <= end; k++) matched.add(`${k},${c}`);
      }
    }
  }
  return Array.from(matched).map(s => {
    const [r, c] = s.split(',').map(Number);
    return { r, c };
  });
}

// ===== SWAP =====
function isValidSwap(r1, c1, r2, c2) {
  return (Math.abs(r1 - r2) + Math.abs(c1 - c2)) === 1;
}

function swapGems(r1, c1, r2, c2) {
  const tmp = grid[r1][c1];
  grid[r1][c1] = grid[r2][c2];
  grid[r2][c2] = tmp;
}

// ===== GRAVITY & FILL =====
function applyGravity(g) {
  const moved = [];
  for (let c = 0; c < COLS; c++) {
    let writeRow = ROWS - 1;
    for (let r = ROWS - 1; r >= 0; r--) {
      if (g[r][c] !== -1) {
        if (r !== writeRow) {
          g[writeRow][c] = g[r][c];
          g[r][c] = -1;
          moved.push({ fromR: r, toR: writeRow, c });
        }
        writeRow--;
      }
    }
    // Fill empty cells from top
    for (let r = writeRow; r >= 0; r--) {
      g[r][c] = randomGem();
      moved.push({ fromR: r - (writeRow + 1), toR: r, c, isNew: true });
    }
  }
  return moved;
}

// ===== SCORING =====
function calculateScore(matchCount, combo) {
  const base = matchCount >= 4 ? matchCount * 20 : matchCount * 10;
  const multiplier = combo >= 0 ? Math.pow(2, combo) : 1;
  return Math.floor(base * multiplier);
}

// ===== RENDER =====
let gemSymbols = ['вЧП', 'вЧЖ', 'вШЕ', 'вЦ≤', 'вЩ¶', 'вђЯ'];
// Replace with better symbols
gemSymbols = ['вЧП', 'вЧЖ', 'вШЕ', 'вЦ≤', 'вђЯ', 'вЬ¶'];

function render() {
  boardEl.style.gridTemplateColumns = `repeat(${COLS}, 1fr)`;
  boardEl.innerHTML = '';
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.row = r;
      cell.dataset.col = c;

      const gem = document.createElement('div');
      gem.className = 'gem';
      const val = grid[r][c];
      if (val !== -1) {
        gem.classList.add(`gem-${val}`);
        gem.textContent = gemSymbols[val];
      } else {
        gem.style.visibility = 'hidden';
      }
      cell.appendChild(gem);

      if (selected && selected.r === r && selected.c === c) {
        cell.classList.add('selected');
      }

      cell.addEventListener('click', () => onCellClick(r, c));
      // Touch support
      cell.addEventListener('touchstart', (e) => { e.preventDefault(); onCellClick(r, c); }, { passive: false });

      boardEl.appendChild(cell);
    }
  }
  scoreEl.textContent = score;
}

// ===== PLAYER INPUT =====
function onCellClick(row, col) {
  if (isAnimating) return;

  if (!selected) {
    selected = { r: row, c: col };
    render();
    hintEl.textContent = 'еЖНзВєеЗїзЫЄйВїжЦєеЭЧдЇ§жНҐ';
    return;
  }

  // Clicking same cell вАФ deselect
  if (selected.r === row && selected.c === col) {
    selected = null;
    render();
    hintEl.textContent = 'зВєеЗїжЦєеЭЧйАЙдЄ≠';
    return;
  }

  // Check adjacency
  if (!isValidSwap(selected.r, selected.c, row, col)) {
    // Select the new cell instead
    selected = { r: row, c: col };
    render();
    return;
  }

  const sr = selected.r, sc = selected.c;
  selected = null;

  // Try swap
  swapGems(sr, sc, row, col);

  // Check if swap produces a match
  const matches = findAllMatches(grid);
  if (matches.length === 0) {
    // Invalid swap вАФ swap back
    swapGems(sr, sc, row, col);
    render();
    hintEl.textContent = 'вЭМ жЧ†ж≥ХжґИйЩ§пЉМеЖНиѓХиѓХ';
    setTimeout(() => {
      hintEl.textContent = 'зВєеЗїзЫЄйВїжЦєеЭЧдЇ§жНҐ';
    }, 1000);
    return;
  }

  isAnimating = true;
  hintEl.textContent = 'жґИйЩ§дЄ≠...';
  comboCount = 0;
  processMatches(matches);
}

// ===== MATCH PROCESSING =====
async function processMatches(matches) {
  while (matches.length > 0) {
    // Calculate score
    for (const m of matches) {
      grid[m.r][m.c] = -1;
    }
    comboCount++;
    const pts = calculateScore(matches.length, comboCount - 1);
    score += pts;

    // Show combo
    if (comboCount >= 2) {
      showCombo(comboCount, pts);
    }

    render();
    await sleep(ANIMATION_SPEED);

    // Spawn particles at matched positions
    spawnParticles(matches);

    // Gravity + fill
    const moved = applyGravity(grid);
    render();
    await sleep(ANIMATION_SPEED);

    // Check for new matches
    const newMatches = findAllMatches(grid);
    if (newMatches.length > 0) {
      matches = newMatches;
    } else {
      matches = [];
    }
  }

  // Check if there are valid moves
  isAnimating = false;
  if (!hasValidMoves()) {
    hintEl.textContent = 'вЪ†пЄП ж≤°жЬЙеПѓжґИйЩ§зЪДж≠•пЉМиЗ™еК®йЗНжОТ...';
    await sleep(800);
    shuffleBoard();
  } else {
    hintEl.textContent = 'зВєеЗїзЫЄйВїжЦєеЭЧдЇ§жНҐ';
  }
}

function hasValidMoves() {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      // Try swap right
      if (c + 1 < COLS) {
        swapGems(r, c, r, c+1);
        if (findAllMatches(grid).length > 0) { swapGems(r, c, r, c+1); return true; }
        swapGems(r, c, r, c+1);
      }
      // Try swap down
      if (r + 1 < ROWS) {
        swapGems(r, c, r+1, c);
        if (findAllMatches(grid).length > 0) { swapGems(r, c, r+1, c); return true; }
        swapGems(r, c, r+1, c);
      }
    }
  }
  return false;
}

function shuffleBoard() {
  // Collect all gem values
  const values = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      values.push(grid[r][c]);
    }
  }
  // Shuffle
  for (let i = values.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [values[i], values[j]] = [values[j], values[i]];
  }
  // Put back
  let idx = 0;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      grid[r][c] = values[idx++];
    }
  }
  // If there are matches or no valid moves, regenerate
  if (hasMatch(grid) || !hasValidMoves()) {
    generateGrid();
  }
  render();
  hintEl.textContent = 'рЯФА еЈ≤йЗНжОТпЉБ';
  setTimeout(() => { hintEl.textContent = 'зВєеЗїзЫЄйВїжЦєеЭЧдЇ§жНҐ'; }, 1000);
}

// ===== UI HELPERS =====
function showCombo(count, pts) {
  comboDisplay.textContent = `рЯФ• ${count}x COMBO! +${pts}`;
  comboDisplay.className = 'combo-display show';
  setTimeout(() => {
    comboDisplay.className = 'combo-display';
  }, 800);
}

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

// ===== PARTICLES =====
function spawnParticles(matches) {
  const rect = boardEl.getBoundingClientRect();
  canvas.width = boardEl.offsetWidth;
  canvas.height = boardEl.offsetHeight;

  const colors = ['#00d4ff', '#ff44dd', '#44ff88', '#ff8833', '#aa55ff', '#ffdd44'];
  const particles = [];

  for (const m of matches) {
    const cells = boardEl.querySelectorAll('.cell');
    const idx = m.r * COLS + m.c;
    if (cells[idx]) {
      const cellRect = cells[idx].getBoundingClientRect();
      const cx = cellRect.left - rect.left + cellRect.width / 2;
      const cy = cellRect.top - rect.top + cellRect.height / 2;
      const color = colors[grid[m.r]?.[m.c] >= 0 ? grid[m.r][m.c] : 0] || '#00d4ff';

      for (let i = 0; i < 6; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 2 + Math.random() * 4;
        particles.push({
          x: cx, y: cy,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - 2,
          life: 1,
          size: 2 + Math.random() * 3,
          color
        });
      }
    }
  }

  if (particles.length === 0) return;

  function animateParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = false;
    for (const p of particles) {
      if (p.life <= 0) continue;
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.1;
      p.life -= 0.025;
      if (p.life <= 0) continue;
      alive = true;
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
    if (alive) requestAnimationFrame(animateParticles);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }

  animateParticles();
}

// ===== SHUFFLE BUTTON =====
document.getElementById('shuffleBtn').addEventListener('click', () => {
  if (isAnimating) return;
  shuffleBoard();
});

// ===== START =====
generateGrid();
render();
</script>
</body>
</html>
