<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>霓虹打砖块 - Zephyr</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#0ff88;font-family:'Courier New',monospace;display:flex;flex-direction:column;align-items:center;min-height:100vh;overflow:hidden;user-select:none}
#ui{display:flex;justify-content:space-between;width:100%;max-width:820px;padding:10px 20px;font-size:18px;text-shadow:0 0 8px #0ff88;color:#0ff88}
#ui span{color:#0ff88;font-weight:bold}
#gc{position:relative;margin-top:5px}
canvas{display:block;border:2px solid #0ff88;box-shadow:0 0 20px #0ff88,inset 0 0 20px rgba(0,255,136,.2);max-width:100vw}
#menu{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(10,10,10,0.96);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10}
#menu.hide{display:none}
#menu h1{font-size:42px;margin-bottom:35px;text-shadow:0 0 20px #0ff88,0 0 40px #0ff88;animation:g 2s ease-in-out infinite alternate}
@keyframes g{from{text-shadow:0 0 20px #0ff88,0 0 40px #0ff88}to{text-shadow:0 0 30px #0ff88,0 0 60px #0ff88,0 0 80px #0ff88}}
#info{font-size:14px;margin-bottom:20px;color:#aaa;text-align:center;line-height:1.6}
.m-btn{background:transparent;color:#0ff88;border:2px solid #0ff88;padding:12px 35px;margin:8px;font-size:18px;cursor:pointer;font-family:monospace;transition:all .3s;box-shadow:0 0 8px #0ff88;display:block;width:220px;text-align:center}
.m-btn:hover{background:#0ff88;color:#0a0a0a;box-shadow:0 0 25px #0ff88}
#mb{display:none;justify-content:space-between;width:100%;max-width:820px;padding:12px 20px;position:fixed;bottom:0;left:0;right:0;margin:0 auto}
.mb-btn{background:rgba(0,255,136,.15);border:2px solid #0ff88;color:#0ff88;padding:18px 45px;font-size:26px;border-radius:10px;cursor:pointer;touch-action:manipulation}
.mb-btn:active{background:rgba(0,255,136,.5)}
@media(max-width:850px){#mb{display:flex}#ui{font-size:14px;padding:8px 12px}}
</style>
</head>
<body>
<div id="ui"><div>分数: <span id="scoreEl">0</span></div><div>生命: <span id="livesEl">3</span></div><div>关卡: <span id="levelEl">1</span></div><div>最高: <span id="highEl">0</span></div></div>
<div id="gc">
<canvas id="cvs" width="800" height="600"></canvas>
<div id="menu">
<h1>霓虹打砖块</h1>
<p id="info">🎮 接住掉落的道具获得能力<br>⏎ 空格发射球 / 激光</p>
<button class="m-btn" onclick="S('easy')">🌱 简单模式</button>
<button class="m-btn" onclick="S('medium')">⚡ 中等模式</button>
<button class="m-btn" onclick="S('hard')">💀 困难模式</button>
</div>
</div>
<div id="mb"><button class="mb-btn" id="mL">◀</button><button class="mb-btn" id="mR">▶</button></div>
<script>
var C=document.getElementById('cvs'),X=C.getContext('2d'),W=800,H=600;

// DOM refs
var sEl=document.getElementById('scoreEl'),lEl=document.getElementById('livesEl');
var vEl=document.getElementById('levelEl'),hEl=document.getElementById('highEl');
var menu=document.getElementById('menu'),mb=document.getElementById('mb');

// Difficulty
var D={easy:{speed:4,lives:3,lbl:'简单'},medium:{speed:5.5,lives:3,lbl:'中等'},hard:{speed:7,lives:2,lbl:'困难'}};
var diff='easy',lives=3,score=0,level=1,MLEVEL=5;
var running=false,speed=4,baseSpeed=4,scale=1;

// Paddle
var P={x:0,y:0,w:120,h:15,nw:120,s:8,dx:0,lz:false};
// Ball
var B={x:0,y:0,dx:0,dy:0,r:8,stuck:true,pen:false,extra:[]};
// Arrays
var bricks=[],parts=[],pups=[],lasers=[];

var kL=false,kR=false,tL=false,tR=false;

function resize(){
  var mw=window.innerWidth-50,mh=window.innerHeight-200;
  var sc=Math.min(mw/800,mh/600,1);
  C.style.width=(800*sc)+'px';C.style.height=(600*sc)+'px';
  scale=sc;
}
resize();window.onresize=resize;

function loadBest(){var v=parseInt(localStorage.getItem('bbest')||'0');hEl.textContent=v;return v}
var best=loadBest();

function saveBest(){if(score>best){best=score;localStorage.setItem('bbest',best);hEl.textContent=best}}

// --- Bricks ---
function genBricks(){
  bricks=[];
  var bw=Math.floor((W-60)/10),bh=25,ox=30,oy=60;
  var cols=10,rows=6;
  var cols2=['#ff3344','#ff8800','#ffcc00','#00ff88','#00ccff','#aa66ff'];
  var layouts=[
    // 1: normal block fill
    function(){
      for(var r=0;r<rows;r++)for(var c=0;c<cols;c++)
        if(Math.random()<0.85)addB(r,c,bw,bh,ox,oy,1,cols2[r%6]);},
    // 2: checker
    function(){
      for(var r=0;r<rows;r++)for(var c=0;c<cols;c++)
        if((r+c)%2===0)addB(r,c,bw,bh,ox,oy,r<2?2:1,cols2[r%6]);},
    // 3: border+inner
    function(){
      for(var r=0;r<rows;r++)for(var c=0;c<cols;c++)
        if(r===0||r===rows-1||c===0||c===cols-1)addB(r,c,bw,bh,ox,oy,2,cols2[r%6]);
        else if(Math.random()<0.4)addB(r,c,bw,bh,ox,oy,1,cols2[r%6]);},
    // 4: diamond
    function(){
      for(var r=0;r<rows;r++)for(var c=0;c<cols;c++){
        var d=Math.abs(r-2.5)+Math.abs(c-4.5);
        if(d<=3)addB(r,c,bw,bh,ox,oy,d<=1?3:d<=2?2:1,cols2[r%6]);}},
    // 5: all hp2
    function(){
      for(var r=0;r<rows;r++)for(var c=0;c<cols;c++)
        addB(r,c,bw,bh,ox,oy,1,cols2[r%6]);}
  ];
  layouts[Math.min(level-1,layouts.length-1)]();
}

function addB(r,c,bw,bh,ox,oy,hp,col){
  bricks.push({x:ox+c*(bw+2),y:oy+r*(bh+4),w:bw-2,h:bh,hp:hp,mhp:hp,col:col,alive:true});
}

// --- Ball ---
function ballInit(){
  B.x=P.x+P.w/2;B.y=P.y-B.r-5;
  B.stuck=true;B.pen=false;
  B.extra=[];
}
function ballRelease(){
  if(!B.stuck)return;
  B.stuck=false;
  var a=-Math.PI/2+(Math.random()-0.5)*0.5;
  var sp=speed*scale;
  B.dx=Math.cos(a)*sp;B.dy=Math.sin(a)*sp;
}

// --- Powerups ---
var PT=[
  {t:'w',l:'↔加长',c:'#0ff88',ch:0.2},
  {t:'s',l:'⏬减速',c:'#0ccff',ch:0.2},
  {t:'m',l:'✦分裂',c:'#ff0ff',ch:0.15},
  {t:'p',l:'⚡穿透',c:'#ff0',ch:0.15},
  {t:'l',l:'🔫激光',c:'#f44',ch:0.1},
  {t:'+',l:'♥+1命',c:'#f66',ch:0.1},
  {t:'n',l:'↨缩短',c:'#f80',ch:0.05},
  {t:'f',l:'⏫加速',c:'#f64',ch:0.05}
];

function dropP(x,y){
  if(Math.random()>0.3)return;
  var tot=0;PT.forEach(function(p){tot+=p.ch});
  var r=Math.random()*tot,idx=0;
  for(var i=0;i<PT.length;i++){r-=PT[i].ch;if(r<=0){idx=i;break}}
  var p=PT[idx];
  pups.push({x:x,y:y,t:p.t,l:p.l,c:p.c,w:75,h:22,dy:2.2*scale,alive:true});
}

function useP(t){
  switch(t){
    case'w':P.w=P.nw*1.5;setTimeout(function(){P.w=P.nw},10000);break;
    case'n':P.w=Math.max(40,P.nw*0.6);setTimeout(function(){P.w=P.nw},5000);break;
    case's':speed=Math.max(baseSpeed*0.5,speed*0.6);setTimeout(function(){speed=baseSpeed},8000);break;
    case'f':speed=Math.min(baseSpeed*1.5,speed*1.4);setTimeout(function(){speed=baseSpeed},5000);break;
    case'm':
      if(B.extra.length<4)for(var i=0;i<2;i++){
        var a=(Math.random()-0.5)*Math.PI/3,sp=speed*scale;
        B.extra.push({x:B.x,y:B.y,dx:Math.cos(a)*sp,dy:Math.sin(a)*sp-2,r:B.r,alive:true});
      }
      break;
    case'p':B.pen=true;setTimeout(function(){B.pen=false},8000);break;
    case'l':P.lz=true;setTimeout(function(){P.lz=false},10000);break;
    case'+':lives=Math.min(lives+1,9);updateUI();break;
  }
}

// --- Particles ---
function pSpawn(x,y,col,n){
  n=n||15;
  for(var i=0;i<n;i++){
    var a=Math.random()*Math.PI*2,sp=1+Math.random()*4;
    parts.push({x:x,y:y,dx:Math.cos(a)*sp,dy:Math.sin(a)*sp,life:40+Math.random()*40,col:col,sz:2+Math.random()*4});
  }
}

// --- Start ---
function S(d){
  diff=d;var c=D[d];
  lives=c.lives;score=0;level=1;baseSpeed=c.speed;speed=c.speed;
  P.w=P.nw;P.lz=false;B.extra=[];B.stuck=true;B.pen=false;
  bricks=[];parts=[];pups=[];lasers=[];
  P.x=W/2-P.w/2;P.y=H-40;
  ballInit();
  genBricks();updateUI();
  menu.classList.add('hide');
  running=true;loop();
}

function updateUI(){
  sEl.textContent=score;lEl.textContent=lives;vEl.textContent=level;
  if(score>best){best=score;localStorage.setItem('bbest',best)}
  hEl.textContent=best;
}

function gameOver(){
  running=false;saveBest();
  menu.querySelector('h1').textContent='游戏结束';
  info.innerHTML='得分: <b style="font-size:24px">'+score+'</b>';
  menu.classList.remove('hide');
}
function victory(){
  running=false;saveBest();
  menu.querySelector('h1').textContent='🎉 全部通关！';
  info.innerHTML='最终得分: <b style="font-size:24px">'+score+'</b>';
  menu.classList.remove('hide');
}

// --- Update ---
function upd(){
  if(!running)return;
  // paddle
  var sp=P.s*scale;
  if(kL||tL)P.x-=sp;if(kR||tR)P.x+=sp;
  if(P.x<0)P.x=0;if(P.x+P.w>W)P.x=W-P.w;
  // ball stuck
  if(B.stuck){B.x=P.x+P.w/2;B.y=P.y-B.r-5}
  else{updB(B)}
  // extra balls
  for(var i=B.extra.length-1;i>=0;i--){updB(B.extra[i]);if(!B.extra[i].alive)B.extra.splice(i,1)}
  // lasers
  if(P.lz){
    if(!laserCD||laserCD<=0){
      lasers.push({x:P.x+P.w*0.3-2,y:P.y,h:15,w:4,dy:-9*scale});
      lasers.push({x:P.x+P.w*0.7-2,y:P.y,h:15,w:4,dy:-9*scale});
      laserCD=12;
    }else laserCD--;
  }
  for(var i=lasers.length-1;i>=0;i--){
    var l=lasers[i];l.y+=l.dy;
    if(l.y<0){lasers.splice(i,1);continue}
    for(var j=0;j<bricks.length;j++){
      var b=bricks[j];if(!b.alive)continue;
      if(l.x<b.x+b.w&&l.x+l.w>b.x&&l.y<b.y+b.h&&l.y+l.h>b.y){
        b.hp--;lasers.splice(i,1);
        if(b.hp<=0){
          b.alive=false;score+=10*b.mhp;
          pSpawn(b.x+b.w/2,b.y+b.h/2,b.col);
          dropP(b.x+b.w/2,b.y+b.h/2);updateUI();
        }
        break;
      }
    }
  }
  // powerups
  for(var i=pups.length-1;i>=0;i--){
    var p=pups[i];if(!p.alive){pups.splice(i,1);continue}
    p.y+=p.dy;
    if(p.y+p.h>P.y&&p.y<P.y+P.h&&p.x+p.w>P.x&&p.x<P.x+P.w){useP(p.t);p.alive=false;continue}
    if(p.y>H+20)pups.splice(i,1);
  }
  // particles
  for(var i=parts.length-1;i>=0;i--){
    var p=parts[i];p.x+=p.dx;p.y+=p.dy;p.life--;
    if(p.life<=0)parts.splice(i,1);
  }
  // check life
  if(!B.stuck&&!B.alive&&B.extra.length===0){
    lives--;updateUI();
    if(lives<=0){gameOver();return}
    P.x=W/2-P.w/2;ballInit();
  }
  // check win
  if(bricks.every(function(b){return!b.alive})){
    if(level<MLEVEL){level++;genBricks();P.x=W/2-P.w/2;ballInit();updateUI()}
    else{victory();return}
  }
}
var laserCD=0;

function updB(b){
  if(!b.alive)return;
  b.x+=b.dx;b.y+=b.dy;
  if(b.x-b.r<0){b.x=b.r;b.dx=-b.dx}
  if(b.x+b.r>W){b.x=W-b.r;b.dx=-b.dx}
  if(b.y-b.r<0){b.y=b.r;b.dy=-b.dy}
  if(b.y+b.r>H+10){b.alive=false;return}
  // paddle hit
  if(b.y+b.r>=P.y&&b.y-b.r<=P.y+P.h&&b.x>=P.x-5&&b.x<=P.x+P.w+5&&b.dy>0){
    var hp=(b.x-P.x)/P.w;
    var a=-Math.PI/2+(hp-0.5)*Math.PI*0.7;
    a=Math.max(a,-Math.PI/2+0.3);a=Math.min(a,Math.PI/2-0.3);
    var sp=Math.sqrt(b.dx*b.dx+b.dy*b.dy);
    b.dx=Math.cos(a)*sp;b.dy=Math.sin(a)*sp;
    b.y=P.y-b.r;
    pSpawn(b.x,b.y,'#0ff88',5);
  }
  // bricks hit
  for(var i=0;i<bricks.length;i++){
    var br=bricks[i];if(!br.alive)continue;
    if(b.x+b.r>br.x&&b.x-b.r<br.x+br.w&&b.y+b.r>br.y&&b.y-b.r<br.y+br.h){
      if(!b.pen){
        var ol=b.x+b.r-b.x;var or=br.x+br.w-(b.x-b.r);
        var ot=b.y+b.r-b.y;var ob=br.y+br.h-(b.y-b.r);
        var min=Math.min(ol,or,ot,ob);
        if(min===ot||min===ob)b.dy=-b.dy;else b.dx=-b.dx;
      }
      br.hp--;
      if(br.hp<=0){
        br.alive=false;score+=10*br.mhp;
        pSpawn(br.x+br.w/2,br.y+br.h/2,br.col);
        dropP(br.x+br.w/2,br.y+br.h/2);
        // speed up
        var dead=bricks.filter(function(b){return!b.alive}).length;
        var tot=bricks.length;
        if(tot>0)speed=baseSpeed*(1+(dead/tot)*1.5);
        speed=Math.min(speed,D[diff].speed*1.5);
        updateUI();
      }
      if(!b.pen)break;
    }
  }
}

// --- Draw ---
function drawBricks(){
  bricks.forEach(function(b){
    if(!b.alive)return;
    var g=X.createLinearGradient(b.x,b.y,b.x,b.y+b.h);
    g.addColorStop(0,b.col);g.addColorStop(1,'#222');
    X.fillStyle=g;
    X.beginPath();X.roundRect(b.x,b.y,b.w,b.h,3);X.fill();
    X.strokeStyle=b.col;X.lineWidth=1;X.shadowBlur=0;
    X.beginPath();X.roundRect(b.x,b.y,b.w,b.h,3);X.stroke();
    if(b.mhp>1){
      X.fillStyle='#fff';X.font='bold '+(13*scale)+'px monospace';
      X.textAlign='center';X.textBaseline='middle';
      X.fillText(b.hp,b.x+b.w/2,b.y+b.h/2);
    }
  });
}

function draw(){
  X.fillStyle='#0a0a0a';X.fillRect(0,0,W,H);
  // grid
  X.strokeStyle='#0ff88';X.lineWidth=1;X.globalAlpha=0.06;
  for(var i=0;i<W;i+=40){X.beginPath();X.moveTo(i,0);X.lineTo(i,H);X.stroke()}
  for(var i=0;i<H;i+=40){X.beginPath();X.moveTo(0,i);X.lineTo(W,i);X.stroke()}
  X.globalAlpha=1;
  // bricks
  drawBricks();
  // paddle
  X.shadowBlur=15;X.shadowColor='#0ff88';X.fillStyle=P.lz?'#f64':'#0ff88';
  X.beginPath();X.roundRect(P.x,P.y,P.w,P.h,6);X.fill();X.shadowBlur=0;
  // ball
  X.shadowBlur=10;X.shadowColor=B.pen?'#ff0':'#fff';X.fillStyle=B.pen?'#ff0':'#fff';
  X.beginPath();X.arc(B.x,B.y,B.r,0,Math.PI*2);X.fill();X.shadowBlur=0;
  // extra balls
  B.extra.forEach(function(b){
    X.shadowBlur=10;X.shadowColor='#0ff';X.fillStyle='#0ff';
    X.beginPath();X.arc(b.x,b.y,b.r,0,Math.PI*2);X.fill();X.shadowBlur=0;
  });
  // lasers
  lasers.forEach(function(l){
    X.fillStyle='#f44';X.shadowBlur=12;X.shadowColor='#f44';
    X.fillRect(l.x,l.y,l.w,l.h);X.shadowBlur=0;
  });
  // powerups
  pups.forEach(function(p){
    if(!p.alive)return;
    X.fillStyle=p.c;X.globalAlpha=0.3;
    X.beginPath();X.roundRect(p.x-1,p.y-1,p.w+2,p.h+2,5);X.fill();X.globalAlpha=1;
    X.strokeStyle=p.c;X.lineWidth=2;
    X.beginPath();X.roundRect(p.x-1,p.y-1,p.w+2,p.h+2,5);X.stroke();
    X.fillStyle=p.c;X.font=(12*scale)+'px monospace';X.textAlign='center';X.textBaseline='middle';
    X.fillText(p.l,p.x+p.w/2,p.y+p.h/2);
  });
  // particles
  parts.forEach(function(p){
    X.fillStyle=p.col;X.globalAlpha=p.life/60;
    X.beginPath();X.arc(p.x,p.y,p.sz,0,Math.PI*2);X.fill();
  });
  X.globalAlpha=1;
  // info overlay
  X.fillStyle='#0ff88';X.font=(12*scale)+'px monospace';X.textAlign='left';X.textBaseline='top';
  X.fillText(D[diff].lbl,8,8);
  if(B.stuck&&running){
    X.textAlign='center';X.fillStyle='rgba(0,255,136,.5)';X.font=(16*scale)+'px monospace';
    X.fillText('点击/空格发射',W/2,H/2+40);
  }
  if(B.pen){X.textAlign='right';X.fillStyle='#ff0';X.font='bold '+(13*scale)+'px monospace';X.fillText('⚡穿透',W-10,8);}
  if(speed>baseSpeed*1.1){X.textAlign='right';X.fillStyle='#f80';X.font=(12*scale)+'px monospace';X.fillText('⚡加速',W-10,26);}
}

function loop(){if(!running)return;upd();draw();requestAnimationFrame(loop)}

// Controls
document.onkeydown=function(e){
  if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A'){kL=true;e.preventDefault()}
  if(e.key==='ArrowRight'||e.key==='d'||e.key==='D'){kR=true;e.preventDefault()}
  if(e.key===' '||e.key==='Enter'){
    e.preventDefault();
    if(B.stuck&&running)ballRelease();
    else if(P.lz&&running)laserCD=0;
  }
};
document.onkeyup=function(e){
  if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A')kL=false;
  if(e.key==='ArrowRight'||e.key==='d'||e.key==='D')kR=false;
};
C.onmousemove=function(e){
  var r=C.getBoundingClientRect();
  var sx=W/r.width;
  P.x=(e.clientX-r.left)*sx-P.w/2;
  if(P.x<0)P.x=0;if(P.x+P.w>W)P.x=W-P.w;
};
C.onclick=function(e){
  if(running&&B.stuck)ballRelease();
  else if(running&&P.lz)laserCD=0;
};
// Touch
C.ontouchmove=function(e){
  e.preventDefault();var r=C.getBoundingClientRect();
  var sx=W/r.width;
  P.x=(e.touches[0].clientX-r.left)*sx-P.w/2;
  if(P.x<0)P.x=0;if(P.x+P.w>W)P.x=W-P.w;
};
var info=document.getElementById('info');

// Mobile buttons
document.getElementById('mL').ontouchstart=function(e){e.preventDefault();tL=true};
document.getElementById('mL').ontouchend=function(){tL=false};
document.getElementById('mR').ontouchstart=function(e){e.preventDefault();tR=true};
document.getElementById('mR').ontouchend=function(){tR=false};

loadBest();
</script>
</body>
</html>
