<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>打砖块 - Zephyr</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            touch-action: none;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 15px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .title {
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(135deg, #00ff88, #00ccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats { display: flex; gap: 15px; }
        .stat { text-align: center; }
        .stat-label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 22px; font-weight: 700; color: #00ff88; }

        .game-area {
            position: relative;
            background: #111;
            border: 2px solid #00ff88;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0,255,136,0.15);
        }

        canvas { display: block; width: 100%; }

        .controls { display: flex; justify-content: center; gap: 10px; margin-top: 15px; }
        .btn {
            background: #1a1a1a;
            border: 1px solid #333;
            color: #e0e0e0;
            padding: 10px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .btn:hover { border-color: #00ff88; color: #00ff88; box-shadow: 0 0 15px rgba(0,255,136,0.2); }
        .btn.active { background: #00ff88; color: #0a0a0a; border-color: #00ff88; }

        /* 遮罩 */
        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.92);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            border-radius: 10px;
            padding: 30px;
        }
        .overlay.show { display: flex; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .overlay h2 {
            font-size: 30px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #00ff88, #00ccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .overlay .sub { color: #666; font-size: 14px; margin-bottom: 20px; }
        .overlay .final { color: #00ff88; font-size: 18px; margin-bottom: 15px; }

        /* 难度选择 */
        .diff-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .diff-btn {
            flex: 1;
            padding: 12px 8px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #1a1a1a;
            color: #e0e0e0;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            text-align: center;
        }
        .diff-btn:hover { border-color: #00ff88; }
        .diff-btn.selected { border-color: #00ff88; background: #0a2a1a; color: #00ff88; box-shadow: 0 0 12px rgba(0,255,136,0.3); }
        .diff-btn .d-name { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
        .diff-btn .d-desc { font-size: 11px; color: #666; }
        .diff-btn.selected .d-desc { color: #00aa66; }

        .overlay .btn { font-size: 16px; padding: 12px 35px; }

        /* 关卡提示 */
        .level-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 15px;
        }
        .level-label { font-size: 12px; color: #555; }
        .level-progress {
            flex: 1;
            height: 6px;
            background: #222;
            border-radius: 3px;
            overflow: hidden;
        }
        .level-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff88, #00ccff);
            border-radius: 3px;
            transition: width 0.3s;
        }
        .speed-tag {
            font-size: 12px;
            color: #00ff88;
            background: #0a2a1a;
            padding: 2px 8px;
            border-radius: 4px;
            border: 1px solid #00ff88;
        }

        /* 移动端 */
        .touch-zone { display: none; justify-content: space-between; margin-top: 15px; padding: 0 20px; }
        .touch-btn {
            width: 70px; height: 70px; border-radius: 50%;
            background: #1a1a1a; border: 2px solid #333;
            color: #00ff88; font-size: 28px;
            display: flex; align-items: center; justify-content: center;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }
        .touch-btn:active { background: #00ff88; color: #0a0a0a; }

        @media (max-width: 600px) {
            .touch-zone { display: flex; }
            .title { font-size: 24px; }
        }
        .tips { text-align: center; margin-top: 10px; color: #555; font-size: 12px; }
        @media (max-width: 600px) { .tips { display: none; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">⚡ 打砖块</div>
            <div class="stats">
                <div class="stat">
                    <div class="stat-label">分数</div>
                    <div class="stat-value" id="score">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">生命</div>
                    <div class="stat-value" id="lives">3</div>
                </div>
                <div class="stat">
                    <div class="stat-label">最高</div>
                    <div class="stat-value" id="best">0</div>
                </div>
            </div>
        </div>

        <div class="game-area">
            <canvas id="game"></canvas>
            <div class="overlay" id="overlay">
                <h2 id="overlayTitle">⚡ 打砖块</h2>
                <p class="sub" id="overlayMsg">选择难度，消灭所有砖块！</p>
                <div class="diff-row" id="diffRow">
                    <button class="diff-btn selected" data-diff="easy" onclick="selectDiff('easy')">
                        <div class="d-name">🌱 简单</div>
                        <div class="d-desc">球速慢，3条命</div>
                    </button>
                    <button class="diff-btn" data-diff="normal" onclick="selectDiff('normal')">
                        <div class="d-name">⚡ 中等</div>
                        <div class="d-desc">球速中，3条命</div>
                    </button>
                    <button class="diff-btn" data-diff="hard" onclick="selectDiff('hard')">
                        <div class="d-name">💀 困难</div>
                        <div class="d-desc">球速快，2条命</div>
                    </button>
                </div>
                <button class="btn" id="overlayBtn" onclick="startGame()">开始游戏</button>
            </div>
        </div>

        <div class="controls" id="controls" style="display:none;">
            <button class="btn" onclick="showOverlay()">🔄 重新开始</button>
        </div>

        <div class="touch-zone" id="touchZone">
            <button class="touch-btn" id="btnLeft">◀</button>
            <button class="touch-btn" id="btnRight">▶</button>
        </div>

        <div class="tips">⌨️ 左右方向键 / 鼠标移动 &nbsp;|&nbsp; 🎯 消灭所有砖块过关</div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');

        const W = 570, H = 700;
        canvas.width = W;
        canvas.height = H;

        // 难度配置
        const DIFFS = {
            easy:   { ballSpeed: 4,  lives: 3, name: '🌱 简单', speedupPer: 0.08,  maxSpeed: 9  },
            normal: { ballSpeed: 6,  lives: 3, name: '⚡ 中等', speedupPer: 0.12, maxSpeed: 12 },
            hard:   { ballSpeed: 8,  lives: 2, name: '💀 困难', speedupPer: 0.15, maxSpeed: 16 }
        };

        let diff = 'easy';
        let running = false;
        let score = 0;
        let lives = 3;
        let best = parseInt(localStorage.getItem('breakout_best') || '0');
        let baseSpeed = 4;
        let currentSpeed = 4;
        let totalBricks = 0;
        let destroyedBricks = 0;

        const $score = document.getElementById('score');
        const $lives = document.getElementById('lives');
        const $best = document.getElementById('best');
        const $overlay = document.getElementById('overlay');
        const $overlayTitle = document.getElementById('overlayTitle');
        const $overlayMsg = document.getElementById('overlayMsg');
        const $overlayBtn = document.getElementById('overlayBtn');
        const $controls = document.getElementById('controls');
        const $diffRow = document.getElementById('diffRow');

        // 挡板
        const paddle = { w: 100, h: 14, x: W / 2 - 50, y: H - 40, speed: 8, dx: 0 };

        // 球
        const ball = { x: W / 2, y: H - 60, r: 10, dx: 4, dy: -4 };

        // 砖块
        const brick = { rows: 6, cols: 9, w: 58, h: 22, pad: 4, offsetTop: 50, offsetLeft: 15 };
        let bricks = [];

        const brickColors = [
            ['#ff4466', '#ff6688'],
            ['#ff8844', '#ffaa66'],
            ['#ffcc00', '#ffdd44'],
            ['#00ff88', '#44ffaa'],
            ['#00ccff', '#44ddff'],
            ['#aa66ff', '#cc88ff']
        ];

        function selectDiff(d) {
            diff = d;
            document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('selected'));
            document.querySelector(`[data-diff="${d}"]`).classList.add('selected');
        }

        function createBricks() {
            bricks = [];
            for (let r = 0; r < brick.rows; r++) {
                bricks[r] = [];
                for (let c = 0; c < brick.cols; c++) {
                    bricks[r][c] = {
                        x: brick.offsetLeft + c * (brick.w + brick.pad),
                        y: brick.offsetTop + r * (brick.h + brick.pad),
                        alive: true,
                        color: brickColors[r][0],
                        glow: brickColors[r][1]
                    };
                }
            }
            totalBricks = brick.rows * brick.cols;
            destroyedBricks = 0;
        }

        function resetBall() {
            ball.x = W / 2;
            ball.y = H - 60;
            ball.dx = (Math.random() > 0.5 ? 1 : -1) * currentSpeed * 0.7;
            ball.dy = -currentSpeed;
        }

        function resetPaddle() {
            paddle.x = W / 2 - paddle.w / 2;
            paddle.dx = 0;
        }

        function startGame() {
            const cfg = DIFFS[diff];
            score = 0;
            lives = cfg.lives;
            baseSpeed = cfg.ballSpeed;
            currentSpeed = cfg.ballSpeed;
            destroyedBricks = 0;
            running = true;

            createBricks();
            resetBall();
            resetPaddle();
            updateUI();
            $overlay.classList.remove('show');
            $controls.style.display = 'flex';
            requestAnimationFrame(gameLoop);
        }

        function showOverlay() {
            running = false;
            $overlayTitle.textContent = '⚡ 打砖块';
            $overlayMsg.textContent = '选择难度，继续挑战！';
            $overlayMsg.className = 'sub';
            $diffRow.style.display = 'flex';
            $overlayBtn.textContent = '开始游戏';
            $overlayBtn.onclick = startGame;
            $overlay.classList.add('show');
            $controls.style.display = 'none';
        }

        function updateUI() {
            $score.textContent = score;
            $lives.textContent = lives;
            if (score > best) {
                best = score;
                localStorage.setItem('breakout_best', best);
            }
            $best.textContent = best;
        }

        // 动态加速
        function applySpeedup() {
            const cfg = DIFFS[diff];
            destroyedBricks++;
            const ratio = destroyedBricks / totalBricks;
            const targetSpeed = baseSpeed * (1 + ratio * cfg.speedupPer);
            currentSpeed = Math.min(targetSpeed, cfg.maxSpeed);

            // 重新设置球速度方向（保持方向，增加速度）
            const currentSpeedNow = Math.sqrt(ball.dx * ball.dx + ball.dy * ball.dy);
            if (currentSpeedNow > 0) {
                const ratio2 = currentSpeed / currentSpeedNow;
                ball.dx *= ratio2;
                ball.dy *= ratio2;
            }
        }

        function drawPaddle() {
            ctx.save();
            ctx.shadowColor = '#00ff88';
            ctx.shadowBlur = 20;
            ctx.fillStyle = '#00ff88';
            ctx.beginPath();
            ctx.roundRect(paddle.x, paddle.y, paddle.w, paddle.h, 7);
            ctx.fill();
            ctx.restore();
        }

        function drawBall() {
            ctx.save();
            ctx.shadowColor = '#fff';
            ctx.shadowBlur = 15;
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        function drawBricks() {
            for (let r = 0; r < brick.rows; r++) {
                for (let c = 0; c < brick.cols; c++) {
                    const b = bricks[r][c];
                    if (!b.alive) continue;
                    ctx.save();
                    ctx.shadowColor = b.glow;
                    ctx.shadowBlur = 10;
                    const grad = ctx.createLinearGradient(b.x, b.y, b.x, b.y + brick.h);
                    grad.addColorStop(0, b.glow);
                    grad.addColorStop(1, b.color);
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.roundRect(b.x, b.y, brick.w, brick.h, 4);
                    ctx.fill();
                    ctx.restore();
                }
            }
        }

        function checkBrickCollision() {
            for (let r = 0; r < brick.rows; r++) {
                for (let c = 0; c < brick.cols; c++) {
                    const b = bricks[r][c];
                    if (!b.alive) continue;
                    if (ball.x + ball.r > b.x &&
                        ball.x - ball.r < b.x + brick.w &&
                        ball.y + ball.r > b.y &&
                        ball.y - ball.r < b.y + brick.h) {
                        b.alive = false;
                        ball.dy = -ball.dy;
                        score += 10;
                        applySpeedup();
                        updateUI();
                        if (checkWin()) {
                            running = false;
                            $overlayTitle.textContent = '🎉 通关！';
                            $overlayMsg.innerHTML = `最终分数: <b style="color:#00ff88;font-size:22px">${score}</b><br>最高速度: ${currentSpeed.toFixed(1)}`;
                            $overlayMsg.className = 'final';
                            $diffRow.style.display = 'none';
                            $overlayBtn.textContent = '再来一局';
                            $overlayBtn.onclick = showOverlay;
                            $overlay.classList.add('show');
                        }
                        return;
                    }
                }
            }
        }

        function checkWin() {
            return bricks.flat().every(b => !b.alive);
        }

        function gameLoop() {
            if (!running) return;

            ctx.clearRect(0, 0, W, H);

            // 移动挡板
            paddle.x += paddle.dx;
            if (paddle.x < 0) paddle.x = 0;
            if (paddle.x + paddle.w > W) paddle.x = W - paddle.w;

            // 移动球
            ball.x += ball.dx;
            ball.y += ball.dy;

            // 球撞墙
            if (ball.x - ball.r < 0 || ball.x + ball.r > W) ball.dx = -ball.dx;
            if (ball.y - ball.r < 0) ball.dy = -ball.dy;

            // 球撞挡板
            if (ball.y + ball.r > paddle.y &&
                ball.y - ball.r < paddle.y + paddle.h &&
                ball.x > paddle.x &&
                ball.x < paddle.x + paddle.w) {
                const hitPos = (ball.x - paddle.x) / paddle.w;
                const angle = (hitPos - 0.5) * Math.PI * 0.7;
                const speed = Math.sqrt(ball.dx * ball.dx + ball.dy * ball.dy);
                ball.dx = Math.sin(angle) * speed;
                ball.dy = -Math.abs(Math.cos(angle) * speed);
            }

            // 球落出
            if (ball.y + ball.r > H) {
                lives--;
                updateUI();
                if (lives <= 0) {
                    running = false;
                    $overlayTitle.textContent = '游戏结束';
                    $overlayMsg.innerHTML = `最终分数: <b style="color:#00ff88;font-size:20px">${score}</b>`;
                    $overlayMsg.className = 'final';
                    $diffRow.style.display = 'none';
                    $overlayBtn.textContent = '重新挑战';
                    $overlayBtn.onclick = showOverlay;
                    $overlay.classList.add('show');
                    return;
                }
                resetBall();
                resetPaddle();
            }

            checkBrickCollision();

            drawBricks();
            drawPaddle();
            drawBall();

            requestAnimationFrame(gameLoop);
        }

        // 控制
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a') paddle.dx = -paddle.speed;
            else if (e.key === 'ArrowRight' || e.key === 'd') paddle.dx = paddle.speed;
        });
        document.addEventListener('keyup', (e) => {
            if (['ArrowLeft', 'ArrowRight', 'a', 'd'].includes(e.key)) paddle.dx = 0;
        });

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = W / rect.width;
            paddle.x = (e.clientX - rect.left) * scaleX - paddle.w / 2;
            if (paddle.x < 0) paddle.x = 0;
            if (paddle.x + paddle.w > W) paddle.x = W - paddle.w;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const scaleX = W / rect.width;
            paddle.x = (e.touches[0].clientX - rect.left) * scaleX - paddle.w / 2;
            if (paddle.x < 0) paddle.x = 0;
            if (paddle.x + paddle.w > W) paddle.x = W - paddle.w;
        }, { passive: false });

        const btnLeft = document.getElementById('btnLeft');
        const btnRight = document.getElementById('btnRight');
        btnLeft.addEventListener('touchstart', (e) => { e.preventDefault(); paddle.dx = -paddle.speed; });
        btnLeft.addEventListener('touchend', () => paddle.dx = 0);
        btnRight.addEventListener('touchstart', (e) => { e.preventDefault(); paddle.dx = paddle.speed; });
        btnRight.addEventListener('touchend', () => paddle.dx = 0);

        $best.textContent = best;
        $overlay.classList.add('show');
    </script>
</body>
</html>
