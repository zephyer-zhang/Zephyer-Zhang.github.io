<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>霓虹打砖块 - Neon Breakout</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {
  background: #0a0a0a;
  color: #00ff88;
  font-family: 'Courier New', monospace;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  overflow: hidden;
  user-select: none;
}
#gameContainer {
  position: relative;
  margin-top: 10px;
}
canvas {
  display: block;
  border: 2px solid #00ff88;
  box-shadow: 0 0 20px #00ff88, inset 0 0 20px rgba(0, 255, 136, 0.1);
  max-width: 100vw;
  max-height: 70vh;
}
#ui {
  display: flex;
  justify-content: space-between;
  width: 800px;
  max-width: 100vw;
  padding: 10px 20px;
  font-size: 18px;
  text-shadow: 0 0 10px #00ff88;
}
#menu {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(10, 10, 10, 0.95);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 10;
}
#menu.hidden {
  display: none;
}
#menu h1 {
  font-size: 48px;
  margin-bottom: 40px;
  text-shadow: 0 0 20px #00ff88, 0 0 40px #00ff88;
  animation: glow 2s ease-in-out infinite alternate;
}
@keyframes glow {
  from { text-shadow: 0 0 20px #00ff88, 0 0 40px #00ff88; }
  to { text-shadow: 0 0 30px #00ff88, 0 0 60px #00ff88, 0 0 80px #00ff88; }
}
.menu-btn {
  background: transparent;
  color: #00ff88;
  border: 2px solid #00ff88;
  padding: 15px 40px;
  margin: 10px;
  font-size: 20px;
  cursor: pointer;
  font-family: 'Courier New', monospace;
  transition: all 0.3s;
  box-shadow: 0 0 10px #00ff88;
}
.menu-btn:hover {
  background: #00ff88;
  color: #0a0a0a;
  box-shadow: 0 0 30px #00ff88;
}
#mobileControls {
  display: none;
  justify-content: space-between;
  width: 100%;
  padding: 20px;
  position: fixed;
  bottom: 0;
  left: 0;
}
.mobile-btn {
  background: rgba(0, 255, 136, 0.2);
  border: 2px solid #00ff88;
  color: #00ff88;
  padding: 20px 40px;
  font-size: 24px;
  border-radius: 10px;
  cursor: pointer;
  touch-action: manipulation;
}
.mobile-btn:active {
  background: rgba(0, 255, 136, 0.5);
}
@media (max-width: 850px) {
  #mobileControls { display: flex; }
  #ui { width: 100vw; font-size: 14px; }
  canvas { max-height: 60vh; }
}
</style>
</head>
<body>
<div id="ui">
  <div>分数: <span id="score">0</span></div>
  <div>生命: <span id="lives">3</span></div>
  <div>关卡: <span id="level">1</span></div>
  <div>最高分: <span id="highScore">0</span></div>
</div>
<div id="gameContainer">
  <canvas id="gameCanvas" width="800" height="600"></canvas>
  <div id="menu">
    <h1>霓虹打砖块</h1>
    <button class="menu-btn" onclick="startGame('easy')">简单模式</button>
    <button class="menu-btn" onclick="startGame('medium')">中等模式</button>
    <button class="menu-btn" onclick="startGame('hard')">困难模式</button>
  </div>
</div>
<div id="mobileControls">
  <button class="mobile-btn" id="leftBtn">←</button>
  <button class="mobile-btn" id="rightBtn">→</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const livesEl = document.getElementById('lives');
const levelEl = document.getElementById('level');
const highScoreEl = document.getElementById('highScore');
const menu = document.getElementById('menu');

let canvasWidth = 800;
let canvasHeight = 600;
let scale = 1;

function resizeCanvas() {
  const maxWidth = window.innerWidth - 40;
  const maxHeight = window.innerHeight - 150;
  scale = Math.min(maxWidth / 800, maxHeight / 600, 1);
  canvasWidth = 800 * scale;
  canvasHeight = 600 * scale;
  canvas.style.width = canvasWidth + 'px';
  canvas.style.height = canvasHeight + 'px';
  canvas.width = canvasWidth;
  canvas.height = canvasHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const game = {
  score: 0,
  lives: 3,
  level: 1,
  maxLevel: 5,
  running: false,
  paused: false,
  difficulty: 'medium',
  baseSpeed: 5,
  speedMultiplier: 1,
  powerUpTimeout: null
};

const paddle = {
  x: 0,
  y: 0,
  width: 120,
  height: 15,
  speed: 8,
  normalWidth: 120,
  laserActive: false,
  laserTimer: null
};

const ball = {
  x: 0,
  y: 0,
  dx: 0,
  dy: 0,
  radius: 8,
  active: false,
  stuck: true,
  extraBalls: []
};

const bricks = [];
const particles = [];
const powerUps = [];
const lasers = [];

const keys = { left: false, right: false };
let mouseX = 0;
let touchLeft = false;
let touchRight = false;

const DIFFICULTY_SETTINGS = {
  easy: { speed: 4, lives: 3, label: '简单' },
  medium: { speed: 5, lives: 3, label: '中等' },
  hard: { speed: 6, lives: 2, label: '困难' }
};

const POWERUP_TYPES = [
  { type: 'elongate', label: '加长', color: '#00ff88', chance: 0.15 },
  { type: 'slow', label: '减速', color: '#00ffff', chance: 0.15 },
  { type: 'split', label: '分裂', color: '#ff00ff', chance: 0.1 },
  { type: 'penetrate', label: '穿透', color: '#ffff00', chance: 0.1 },
  { type: 'laser', label: '激光', color: '#ff0000', chance: 0.1 },
  { type: 'life', label: '+1命', color: '#00ff00', chance: 0.1 },
  { type: 'shorten', label: '缩短', color: '#ff8800', chance: 0.05 }
];

function initGame() {
  paddle.width = paddle.normalWidth;
  paddle.x = canvasWidth / 2 - paddle.width / 2;
  paddle.y = canvasHeight - 40;
  paddle.laserActive = false;
  
  ball.x = canvasWidth / 2;
  ball.y = paddle.y - ball.radius - 5;
  ball.active = true;
  ball.stuck = true;
  ball.dx = 0;
  ball.dy = 0;
  ball.extraBalls = [];
  
  game.speedMultiplier = 1;
  game.baseSpeed = DIFFICULTY_SETTINGS[game.difficulty].speed;
  
  particles.length = 0;
  powerUps.length = 0;
  lasers.length = 0;
  
  createBricks();
  loadHighScore();
}

function createBricks() {
  bricks.length = 0;
  const rows = 6;
  const cols = 10;
  const brickWidth = (canvasWidth - 40) / cols;
  const brickHeight = 25;
  const offsetX = 20;
  const offsetY = 60;
  
  const layouts = [
    function() {
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if (Math.random() > 0.2) {
            addBrick(r, c, brickWidth, brickHeight, offsetX, offsetY, 1, getBrickColor(r));
          }
        }
      }
    },
    function() {
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if ((r + c) % 2 === 0) {
            const hp = r < 2 ? 2 : 1;
            addBrick(r, c, brickWidth, brickHeight, offsetX, offsetY, hp, getBrickColor(r));
        }
        }
      }
    },
    function() {
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if (r === 0 || r === rows - 1 || c === 0 || c === cols - 1) {
            addBrick(r, c, brickWidth, brickHeight, offsetX, offsetY, 2, getBrickColor(r));
          } else if (Math.random() > 0.3) {
            addBrick(r, c, brickWidth, brickHeight, offsetX, offsetY, 1, getBrickColor(r));
          }
        }
      }
    },
    function() {
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const centerR = Math.floor(rows / 2);
          const centerC = Math.floor(cols / 2);
          const dist = Math.abs(r - centerR) + Math.abs(c - centerC);
          if (dist <= 4) {
            const hp = dist === 0 ? 3 : dist <= 2 ? 2 : 1;
            addBrick(r, c, brickWidth, brickHeight, offsetX, offsetY, hp, getBrickColor(r));
          }
        }
      }
    },
    function() {
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if (r < 2) {
            addBrick(r, c, brickWidth, brickHeight, offsetX, offsetY, 3, '#ff0000');
          } else if (r < 4) {
            addBrick(r, c, brickWidth, brickHeight, offsetX, offsetY, 2, '#ffff00');
          } else {
            addBrick(r, c, brickWidth, brickHeight, offsetX, offsetY, 1, '#00ff88');
          }
        }
      }
    }
  ];
  
  layouts[game.level - 1]();
}

function addBrick(r, c, bw, bh, ox, oy, hp, color) {
  bricks.push({
    x: ox + c * bw,
    y: oy + r * (bh + 5),
    width: bw - 5,
    height: bh,
    hp: hp,
    maxHp: hp,
    color: color,
    alive: true
  });
}

function getBrickColor(row) {
  const colors = ['#ff0000', '#ff8800', '#ffff00', '#00ff88', '#00ffff', '#0088ff'];
  return colors[row % colors.length];
}

function startGame(difficulty) {
  game.difficulty = difficulty;
  game.lives = DIFFICULTY_SETTINGS[difficulty].lives;
  game.level = 1;
  game.score = 0;
  game.running = true;
  menu.classList.add('hidden');
  initGame();
  updateUI();
  gameLoop();
}

function releaseBall() {
  if (ball.stuck) {
    ball.stuck = false;
    const angle = -Math.PI / 2 + (Math.random() - 0.5) * 0.5;
    const speed = game.baseSpeed * game.speedMultiplier * scale;
    ball.dx = Math.cos(angle) * speed;
    ball.dy = Math.sin(angle) * speed;
  }
}

function updateUI() {
  scoreEl.textContent = game.score;
  livesEl.textContent = game.lives;
  levelEl.textContent = game.level;
  highScoreEl.textContent = localStorage.getItem('breakoutHighScore') || 0;
}

function loadHighScore() {
  const hs = localStorage.getItem('breakoutHighScore') || 0;
  highScoreEl.textContent = hs;
}

function saveHighScore() {
  const hs = parseInt(localStorage.getItem('breakoutHighScore') || 0);
  if (game.score > hs) {
    localStorage.setItem('breakoutHighScore', game.score);
    highScoreEl.textContent = game.score;
  }
}

function launchPowerUp(x, y) {
  if (Math.random() > 0.3) return;
  
  const totalChance = POWERUP_TYPES.reduce((sum, p) => sum + p.chance, 0);
  let rand = Math.random() * totalChance;
  
  for (const p of POWERUP_TYPES) {
    rand -= p.chance;
    if (rand <= 0) {
      powerUps.push({
        x: x,
        y: y,
        type: p.type,
        label: p.label,
        color: p.color,
        width: 80,
        height: 25,
        dy: 2 * scale
      });
      break;
    }
  }
}

function activatePowerUp(type) {
  switch(type) {
    case 'elongate':
      paddle.width = paddle.normalWidth * 1.5;
      setTimeout(() => { paddle.width = paddle.normalWidth; }, 10000);
      break;
    case 'shorten':
      paddle.width = paddle.normalWidth * 0.6;
      setTimeout(() => { paddle.width = paddle.normalWidth; }, 10000);
      break;
    case 'slow':
      game.speedMultiplier = Math.max(0.5, game.speedMultiplier * 0.7);
      setTimeout(() => { game.speedMultiplier = 1; }, 8000);
      break;
    case 'split':
      if (ball.extraBalls.length < 4) {
        const speed = game.baseSpeed * game.speedMultiplier * scale;
        for (let i = 0; i < 2; i++) {
          const angle = Math.random() * Math.PI / 3 - Math.PI / 6;
          ball.extraBalls.push({
            x: ball.x,
            y: ball.y,
            dx: Math.cos(angle) * speed,
            dy: Math.sin(angle) * speed,
            radius: ball.radius,
            active: true
          });
        }
      }
      break;
    case 'penetrate':
      ball.penetrate = true;
      setTimeout(() => { ball.penetrate = false; }, 8000);
      break;
    case 'laser':
      paddle.laserActive = true;
      setTimeout(() => { paddle.laserActive = false; }, 10000);
      break;
    case 'life':
      game.lives = Math.min(game.lives + 1, 5);
      break;
  }
}

function createParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 3;
    particles.push({
      x: x,
      y: y,
      dx: Math.cos(angle) * speed * scale,
      dy: Math.sin(angle) * speed * scale,
      life: 30 + Math.random() * 30,
      color: color,
      size: 2 + Math.random() * 4
    });
  }
}

function shootLaser() {
  if (paddle.laserActive) {
    lasers.push({
      x: paddle.x + paddle.width / 2 - 2,
      y: paddle.y,
      width: 4,
      height: 15,
      dy: -8 * scale
    });
  }
}

function update() {
  if (!game.running || game.paused) return;
  
  const scaledSpeed = paddle.speed * scale;
  if (keys.left || touchLeft) {
    paddle.x = Math.max(0, paddle.x - scaledSpeed);
  }
  if (keys.right || touchRight) {
    paddle.x = Math.min(canvasWidth - paddle.width, paddle.x + scaledSpeed);
  }
  
  if (ball.stuck) {
    ball.x = paddle.x + paddle.width / 2;
    ball.y = paddle.y - ball.radius - 5;
  } else {
    updateBall(ball);
  }
  
  ball.extraBalls = ball.extraBalls.filter(eb => {
    updateBall(eb);
    return eb.active;
  });
  
  lasers.forEach(laser => {
    laser.y += laser.dy;
  });
  lasers = lasers.filter(l => l.y > 0);
  
  lasers.forEach(laser => {
    bricks.forEach(brick => {
      if (brick.alive && 
          laser.x < brick.x + brick.width &&
          laser.x + laser.width > brick.x &&
          laser.y < brick.y + brick.height &&
          laser.y + laser.height > brick.y) {
        brick.hp--;
        laser.y = -100;
        if (brick.hp <= 0) {
          brick.alive = false;
          game.score += 10;
          createParticles(brick.x + brick.width/2, brick.y + brick.height/2, brick.color, 15);
          launchPowerUp(brick.x + brick.width/2, brick.y + brick.height/2);
        }
      }
    });
  });
  
  powerUps.forEach(pu => {
    pu.y += pu.dy;
    if (pu.y > canvasHeight) {
      pu.active = false;
      return;
    }
    if (pu.x < paddle.x + paddle.width &&
        pu.x + pu.width > paddle.x &&
        pu.y < paddle.y + paddle.height &&
        pu.y + pu.height > paddle.y) {
      activatePowerUp(pu.type);
      pu.active = false;
    }
  });
  powerUps.filter(pu => pu.active !== false);
  
  particles.forEach(p => {
    p.x += p.dx;
    p.y += p.dy;
    p.life--;
  });
  particles.filter(p => p.life > 0);
  
  if (!ball.stuck && !ball.active && ball.extraBalls.length === 0) {
    game.lives--;
    updateUI();
    if (game.lives <= 0) {
      gameOver();
    } else {
      resetBall();
    }
  }
  
  const aliveBricks = bricks.filter(b => b.alive);
  if (aliveBricks.length === 0) {
    nextLevel();
  }
}

function updateBall(b) {
  if (!b.active) return;
  
  const speed = game.baseSpeed * game.speedMultiplier * scale;
  const currentSpeed = Math.sqrt(b.dx * b.dx + b.dy * b.dy);
  
  b.x += b.dx;
  b.y += b.dy;
  
  if (b.x - b.radius < 0) {
    b.x = b.radius;
    b.dx = Math.abs(b.dx);
  }
  if (b.x + b.radius > canvasWidth) {
    b.x = canvasWidth - b.radius;
    b.dx = -Math.abs(b.dx);
  }
  if (b.y - b.radius < 0) {
    b.y = b.radius;
    b.dy = Math.abs(b.dy);
  }
  
  if (b.y + b.radius > canvasHeight) {
    b.active = false;
    return;
  }
  
  if (b.y + b.radius > paddle.y &&
      b.y - b.radius < paddle.y + paddle.height &&
      b.x > paddle.x &&
      b.x < paddle.x + paddle.width) {
    const hitPos = (b.x - paddle.x) / paddle.width;
    const angle = -Math.PI / 2 + (hitPos - 0.5) * (Math.PI * 0.7);
    const minAngle = 0.3;
    const adjustedAngle = angle < 0 ? Math.max(angle, -Math.PI/2 + minAngle) : Math.min(angle, Math.PI/2 - minAngle);
    b.dx = Math.cos(adjustedAngle) * speed;
    b.dy = Math.sin(adjustedAngle) * speed;
    b.y = paddle.y - b.radius;
    
    createParticles(b.x, b.y, '#00ff88', 5);
  }
  
  bricks.forEach(brick => {
    if (!brick.alive) return;
    
    if (b.x + b.radius > brick.x &&
        b.x - b.radius < brick.x + brick.width &&
        b.y + b.radius > brick.y &&
        b.y - b.radius < brick.y + brick.height) {
      
      if (ball.penetrate) {
        brick.hp--;
      } else {
        const overlapLeft = (b.x + b.radius) - brick.x;
        const overlapRight = (brick.x + brick.width) - (b.x - b.radius);
        const overlapTop = (b.y + b.radius) - brick.y;
        const overlapBottom = (brick.y + brick.height) - (b.y - b.radius);
        const minOverlap = Math.min(overlapLeft, overlapRight, overlapTop, overlapBottom);
        
        if (minOverlap === overlapTop || minOverlap === overlapBottom) {
          b.dy = -b.dy;
        } else {
          b.dx = -b.dx;
        }
        brick.hp--;
      }
      
      if (brick.hp <= 0) {
        brick.alive = false;
        game.score += 10 * brick.maxHp;
        createParticles(brick.x + brick.width/2, brick.y + brick.height/2, brick.color, 15);
        launchPowerUp(brick.x + brick.width/2, brick.y + brick.height/2);
        
        const destroyedCount = bricks.filter(b => !b.alive).length;
        const totalCount = bricks.length;
        game.speedMultiplier = 1 + (destroyedCount / totalCount) * 0.5;
      }
      
      if (!ball.penetrate) return;
    }
  });
}

function resetBall() {
  ball.stuck = true;
  ball.active = true;
  ball.x = paddle.x + paddle.width / 2;
  ball.y = paddle.y - ball.radius - 5;
  ball.dx = 0;
  ball.dy = 0;
  ball.extraBalls = [];
}

function nextLevel() {
  if (game.level >= game.maxLevel) {
    victory();
    return;
  }
  game.level++;
  game.speedMultiplier = 1;
  initGame();
  updateUI();
}

function gameOver() {
  game.running = false;
  saveHighScore();
  setTimeout(() => {
    alert('游戏结束！得分: ' + game.score);
    menu.classList.remove('hidden');
  }, 100);
}

function victory() {
  game.running = false;
  saveHighScore();
  setTimeout(() => {
    alert('恭喜通关！得分: ' + game.score);
    menu.classList.remove('hidden');
  }, 100);
}

function draw() {
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, canvasWidth, canvasHeight);
  
  ctx.strokeStyle = '#00ff88';
  ctx.lineWidth = 1;
  ctx.globalAlpha = 0.2;
  for (let i = 0; i < canvasWidth; i += 40) {
    ctx.beginPath();
    ctx.moveTo(i, 0);
    ctx.lineTo(i, canvasHeight);
    ctx.stroke();
  }
  for (let i = 0; i < canvasHeight; i += 40) {
    ctx.beginPath();
    ctx.moveTo(0, i);
    ctx.lineTo(canvasWidth, i);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
  
  bricks.forEach(brick => {
    if (!brick.alive) return;
    
    const gradient = ctx.createLinearGradient(brick.x, brick.y, brick.x, brick.y + brick.height);
    gradient.addColorStop(0, brick.color);
    gradient.addColorStop(1, '#0a0a0a');
    
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.roundRect(brick.x, brick.y, brick.width, brick.height, 3);
    ctx.fill();
    
    ctx.strokeStyle = brick.color;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.roundRect(brick.x, brick.y, brick.width, brick.height, 3);
    ctx.stroke();
    
    if (brick.maxHp > 1) {
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold ' + (14 * scale) + 'px Courier New';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(brick.hp, brick.x + brick.width/2, brick.y + brick.height/2);
    }
  });
  
  ctx.fillStyle = '#00ff88';
  ctx.shadowBlur = 15;
  ctx.shadowColor = '#00ff88';
  ctx.beginPath();
  ctx.roundRect(paddle.x, paddle.y, paddle.width, paddle.height, 5);
  ctx.fill();
  ctx.shadowBlur = 0;
  
  if (paddle.laserActive) {
    ctx.fillStyle = '#ff0000';
    ctx.beginPath();
    ctx.roundRect(paddle.x + 5, paddle.y - 10, paddle.width - 10, 10, 3);
    ctx.fill();
  }
  
  ctx.fillStyle = '#ffffff';
  ctx.shadowBlur = 10;
  ctx.shadowColor = '#ffffff';
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
  
  ball.extraBalls.forEach(eb => {
    if (!eb.active) return;
    ctx.fillStyle = '#00ffff';
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#00ffff';
    ctx.beginPath();
    ctx.arc(eb.x, eb.y, eb.radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  });
  
  lasers.forEach(laser => {
    ctx.fillStyle = '#ff0000';
    ctx.shadowBlur = 15;
    ctx.shadowColor = '#ff0000';
    ctx.fillRect(laser.x, laser.y, laser.width, laser.height);
    ctx.shadowBlur = 0;
  });
  
  powerUps.forEach(pu => {
    if (pu.active === false) return;
    ctx.fillStyle = pu.color;
    ctx.globalAlpha = 0.3;
    ctx.beginPath();
    ctx.roundRect(pu.x - pu.width/2, pu.y - pu.height/2, pu.width, pu.height, 5);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.strokeStyle = pu.color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.roundRect(pu.x - pu.width/2, pu.y - pu.height/2, pu.width, pu.height, 5);
    ctx.stroke();
    
    ctx.fillStyle = pu.color;
    ctx.font = (12 * scale) + 'px Courier New';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(pu.label, pu.x, pu.y);
  });
  
  particles.forEach(p => {
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.life / 60;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  });
  
  ctx.fillStyle = '#00ff88';
  ctx.font = (16 * scale) + 'px Courier New';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText('难度: ' + DIFFICULTY_SETTINGS[game.difficulty].label, 10, 10);
  
  if (ball.penetrate) {
    ctx.fillStyle = '#ffff00';
    ctx.fillText('穿透模式!', canvasWidth - 100, 10);
  }
  if (game.speedMultiplier > 1) {
    ctx.fillStyle = '#ff8800';
    ctx.fillText('加速 x' + game.speedMultiplier.toFixed(2), canvasWidth - 100, 30);
  }
}

function gameLoop() {
  if (!game.running) return;
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = true;
  if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = true;
  if (e.key === ' ' || e.key === 'Enter') {
    e.preventDefault();
    if (game.running) {
      if (ball.stuck) releaseBall();
      else shootLaser();
    }
  }
});

document.addEventListener('keyup', (e) => {
  if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = false;
  if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = false;
});

canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.clientX - rect.left) * (canvasWidth / rect.width);
  if (game.running && !game.paused) {
    paddle.x = mouseX - paddle.width / 2;
    paddle.x = Math.max(0, Math.min(canvasWidth - paddle.width, paddle.x));
  }
});

canvas.addEventListener('click', (e) => {
  if (game.running && ball.stuck) {
    releaseBall();
  } else if (game.running) {
    shootLaser();
  }
});

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (game.running && ball.stuck) {
    releaseBall();
  }
});

document.getElementById('leftBtn').addEventListener('touchstart', (e) => {
  e.preventDefault();
  touchLeft = true;
});
document.getElementById('leftBtn').addEventListener('touchend', (e) => {
  e.preventDefault();
  touchLeft = false;
});
document.getElementById('rightBtn').addEventListener('touchstart', (e) => {
  e.preventDefault();
  touchRight = true;
});
document.getElementById('rightBtn').addEventListener('touchend', (e) => {
  e.preventDefault();
  touchRight = false;
});

let touchStartX = 0;
canvas.addEventListener('touchstart', (e) => {
  touchStartX = e.touches[0].clientX;
  if (game.running && ball.stuck) {
    releaseBall();
  }
});

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const touchX = (e.touches[0].clientX - rect.left) * (canvasWidth / rect.width);
  paddle.x = touchX - paddle.width / 2;
  paddle.x = Math.max(0, Math.min(canvasWidth - paddle.width, paddle.x));
});

loadHighScore();
</script>
