<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,maximum-scale=1">
<title>霓虹打砖块 - Zephyr</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#0ff;font-family:'Courier New',monospace;display:flex;flex-direction:column;align-items:center;min-height:100vh;overflow:hidden;user-select:none;-webkit-user-select:none;touch-action:none}

#bar{display:flex;justify-content:space-between;width:100%;max-width:820px;padding:8px 20px;font-size:17px;text-shadow:0 0 6px #0ff;position:relative;z-index:10}
#bar span{color:#0ff;font-weight:bold}

#box{position:relative;margin-top:4px;touch-action:none}
canvas{display:block;border:2px solid #0ff;box-shadow:0 0 18px #0ff,inset 0 0 20px rgba(0,255,255,.12);background:#0a0a0a;touch-action:none}

#menu{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(10,10,10,.97);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20}
#menu.hide{display:none}
#menu h1{font-size:38px;margin-bottom:10px;text-shadow:0 0 20px #0ff,0 0 40px #0ff;animation:pulse 2s ease-in-out infinite alternate}
@keyframes pulse{from{text-shadow:0 0 20px #0ff}to{text-shadow:0 0 40px #0ff,0 0 60px #0ff}}
#info{font-size:14px;margin-bottom:22px;color:#aaa;text-align:center;line-height:1.7;max-width:420px}

.bt{background:transparent;color:#0ff;border:2px solid #0ff;padding:11px 34px;margin:7px;font-size:17px;cursor:pointer;font-family:monospace;transition:all .25s;display:block;width:200px;text-align:center;border-radius:6px;touch-action:manipulation}
.bt:hover,.bt:active{background:#0ff;color:#0a0a0a;box-shadow:0 0 22px #0ff}

/* 移动端控制栏 */
#touchBar{display:none;position:fixed;bottom:0;left:0;right:0;height:72px;z-index:15;background:rgba(10,10,10,.85);border-top:1px solid rgba(0,255,255,.2);justify-content:space-between;align-items:center;padding:0 30px}
#touchBar.show{display:flex}
#touchBar .zone{width:36%;height:100%;display:flex;align-items:center;justify-content:center;font-size:32px;color:rgba(0,255,255,.25);user-select:none}
#touchBar .zone.l{text-align:left;justify-content:flex-start}
#touchBar .zone.r{text-align:right;justify-content:flex-end}
#touchBar .fire{width:28%;height:56px;background:rgba(0,255,255,.08);border:2px solid rgba(0,255,255,.35);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;color:#0ff;user-select:none;touch-action:manipulation}
#touchBar .fire:active{background:rgba(0,255,255,.3);border-color:#0ff}

@media(max-width:850px){
  #bar{font-size:13px;padding:6px 10px}
  #touchBar.show{display:flex}
}
@media(max-width:500px){
  #bar{font-size:11px;padding:4px 6px}
}
</style>
</head>
<body>

<div id="bar">
  <div>分数: <span id="e0">0</span></div>
  <div>生命: <span id="e1">3</span></div>
  <div>关卡: <span id="e2">1</span></div>
  <div>最高: <span id="e3">0</span></div>
</div>

<div id="box">
  <canvas id="c" width="800" height="600"></canvas>
  <div id="menu">
    <h1>⚡ 霓虹打砖块</h1>
    <p id="info">🎮 鼠标/触屏移动挡板 ｜ 点击/空格发射球<br>💎 接住掉落道具获得特殊能力</p>
    <button class="bt" onclick="start('easy')">🌱 简单（慢速 · 3命）</button>
    <button class="bt" onclick="start('normal')">⚡ 中等（中速 · 3命）</button>
    <button class="bt" onclick="start('hard')">💀 困难（快速 · 2命）</button>
  </div>
</div>

<!-- 移动端触控栏 -->
<div id="touchBar">
  <div class="zone l" id="tLeft">◀◀</div>
  <div class="fire" id="tFire">发射</div>
  <div class="zone r" id="tRight">▶▶</div>
</div>

<script>
(function(){
var c=document.getElementById('c'),ctx=c.getContext('2d');
var e0=document.getElementById('e0'),e1=document.getElementById('e1');
var e2=document.getElementById('e2'),e3=document.getElementById('e3');
var menu=document.getElementById('menu'),info=document.getElementById('info');
var tBar=document.getElementById('touchBar');
var W=800,H=600,run=false,sc=1;

// 难度
var CFG={easy:{sp:4,li:3},normal:{sp:5.5,li:3},hard:{sp:7,li:2}};
var diff,lives,score,level,baseSp,curSp;
var best=parseInt(localStorage.getItem('bbp')||'0');e3.textContent=best;

// 挡板
var P={x:0,y:0,w:110,h:14,sp:7};
// 主球
var ball={x:0,y:0,dx:0,dy:0,r:8,stuck:true,alive:true,penetrate:false};
// 分裂球
var extras=[];
var bricks=[],particles=[],pups=[],lasers=[];

var kL=false,kR=false,tL=false,tR=false,laserCD=0;

// 触控状态
var touchId=null, touchStartX=0, touchPaddleX=0, touchMode='move'; // 'move' or 'btn'

// 缩放
function resize(){
  var mw=window.innerWidth-16,mh=window.innerHeight-120;
  sc=Math.min(mw/800,mh/600,1);
  c.style.width=(800*sc)+'px';c.style.height=(600*sc)+'px';
  P.y=H-40;
}
resize();window.onresize=resize;

// ========== 音效系统 ==========
var audioCtx=null;
function getAC(){if(!audioCtx){try{audioCtx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}}return audioCtx}
function playSnd(type){
  var ac=getAC();if(!ac)return;
  if(ac.state==='suspended')ac.resume();
  var o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);
  var t=ac.currentTime;
  if(type==='hit'){
    o.type='triangle';o.frequency.setValueAtTime(440,t);o.frequency.exponentialRampToValueAtTime(880,t+0.06);
    g.gain.setValueAtTime(0.12,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.1);
    o.start(t);o.stop(t+0.1);
  }else if(type==='brick'){
    o.type='square';o.frequency.setValueAtTime(600,t);o.frequency.exponentialRampToValueAtTime(1200,t+0.08);
    g.gain.setValueAtTime(0.1,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.12);
    o.start(t);o.stop(t+0.12);
  }else if(type==='paddle'){
    o.type='sine';o.frequency.setValueAtTime(300,t);o.frequency.exponentialRampToValueAtTime(600,t+0.08);
    g.gain.setValueAtTime(0.13,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.1);
    o.start(t);o.stop(t+0.1);
  }else if(type==='dead'){
    o.type='sawtooth';o.frequency.setValueAtTime(200,t);o.frequency.exponentialRampToValueAtTime(60,t+0.4);
    g.gain.setValueAtTime(0.15,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.45);
    o.start(t);o.stop(t+0.45);
  }else if(type==='power'){
    var notes=[523,659,784];
    notes.forEach(function(f,i){var o2=ac.createOscillator(),g2=ac.createGain();o2.connect(g2);g2.connect(ac.destination);o2.type='sine';o2.frequency.value=f;g2.gain.setValueAtTime(0,t+i*0.08);g2.gain.linearRampToValueAtTime(0.15,t+i*0.08+0.02);g2.gain.exponentialRampToValueAtTime(0.001,t+i*0.08+0.15);o2.start(t+i*0.08);o2.stop(t+i*0.08+0.15)});
  }else if(type==='win'){
    var notes=[523,659,784,1047];
    notes.forEach(function(f,i){var o2=ac.createOscillator(),g2=ac.createGain();o2.connect(g2);g2.connect(ac.destination);o2.type='sine';o2.frequency.value=f;g2.gain.setValueAtTime(0,t+i*0.15);g2.gain.linearRampToValueAtTime(0.18,t+i*0.15+0.03);g2.gain.exponentialRampToValueAtTime(0.001,t+i*0.15+0.25);o2.start(t+i*0.15);o2.stop(t+i*0.15+0.25)});
  }else if(type==='wall'){
    o.type='sine';o.frequency.setValueAtTime(220,t);o.frequency.exponentialRampToValueAtTime(330,t+0.04);
    g.gain.setValueAtTime(0.06,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.06);
    o.start(t);o.stop(t+0.06);
  }
}

// 存档
function saveBest(){if(score>best){best=score;localStorage.setItem('bbp',best);e3.textContent=best}}
function updateUI(){e0.textContent=score;e1.textContent=lives;e2.textContent=level;saveBest()}

// 生成砖块
function makeBricks(){
  bricks=[];
  var cols=10,rows=6;
  var bw=Math.floor((W-60)/10),bh=24,ox=30,oy=58;
  var colors=['#ff3344','#ff8800','#ffcc00','#00ff88','#00ccff','#aa66ff'];
  var fn=[
    function(){for(var r=0;r<rows;r++)for(var c=0;c<cols;c++)if(Math.random()<0.85)addB(r,c,1,colors[r%6])},
    function(){for(var r=0;r<rows;r++)for(var c=0;c<cols;c++)if((r+c)%2===0)addB(r,c,r<2?2:1,colors[r%6])},
    function(){for(var r=0;r<rows;r++)for(var c=0;c<cols;c++){if(r===0||r===rows-1||c===0||c===cols-1)addB(r,c,2,colors[r%6]);else if(Math.random()<0.35)addB(r,c,1,colors[r%6]);}},
    function(){for(var r=0;r<rows;r++)for(var c=0;c<10;c++){var d=Math.abs(r-2.5)+Math.abs(c-4.5);if(d<=3){var hp=d<=1?3:d<=2?2:1;addB(r,c,hp,colors[r%6])}}},
    function(){for(var r=0;r<rows;r++)for(var c=0;c<cols;c++)addB(r,c,r<2?3:r<4?2:1,colors[r%6])}
  ];
  fn[Math.min(level-1,4)]();
}
function addB(r,c,hp,col){bricks.push({x:30+c*(bw+2),y:58+r*29,w:bw-2,h:24,hp:hp,maxHp:hp,col:col,alive:true})}
var bw=Math.floor((W-60)/10);

// 球
function initBall(){ball.x=P.x+P.w/2;ball.y=P.y-ball.r-5;ball.dx=0;ball.dy=0;ball.stuck=true;ball.alive=true;ball.penetrate=false;extras=[]}
function launchBall(){if(!ball.stuck)return;ball.stuck=false;var angle=-Math.PI/2+(Math.random()-0.5)*0.5;var s=curSp*sc;ball.dx=Math.cos(angle)*s;ball.dy=Math.sin(angle)*s}

// 道具
var PW=[
  {key:'widen',label:'加长',color:'#0ff',chance:0.18},
  {key:'slow',label:'减速',color:'#0cf',chance:0.15},
  {key:'split',label:'分裂',color:'#f0f',chance:0.12},
  {key:'penetrate',label:'穿透',color:'#ff0',chance:0.12},
  {key:'laser',label:'激光',color:'#f44',chance:0.1},
  {key:'life',label:'+1命',color:'#f6f',chance:0.1},
  {key:'narrow',label:'缩短',color:'#f80',chance:0.05},
  {key:'fast',label:'加速',color:'#f64',chance:0.05}
];
function tryDrop(x,y){if(Math.random()>0.3)return;var total=0;for(var i=0;i<PW.length;i++)total+=PW[i].chance;var r=Math.random()*total,idx=0;for(var i=0;i<PW.length;i++){r-=PW[i].chance;if(r<=0){idx=i;break}}var p=PW[Math.min(idx,PW.length-1)];pups.push({x:x,y:y,key:p.key,label:p.label,color:p.color,w:78,h:22,dy:2.2*sc,alive:true})}
function usePower(key){
  playSnd('power');
  if(key==='widen'){P.w=P.w*1.5;setTimeout(function(){P.w=110},10000)}
  else if(key==='narrow'){P.w=Math.max(50,P.w*0.6);setTimeout(function(){P.w=110},5000)}
  else if(key==='slow'){curSp=Math.max(baseSp*0.5,curSp*0.6);setTimeout(function(){curSp=baseSp},8000)}
  else if(key==='fast'){curSp=Math.min(baseSp*1.5,curSp*1.4);setTimeout(function(){curSp=baseSp},5000)}
  else if(key==='split'){if(extras.length<4){var s=curSp*sc;for(var i=0;i<2;i++){var a=(Math.random()-0.5)*0.5;extras.push({x:ball.x,y:ball.y,dx:Math.cos(a)*s,dy:Math.sin(a)*s-1.5,r:ball.r,alive:true})}}}
  else if(key==='penetrate'){ball.penetrate=true;setTimeout(function(){ball.penetrate=false},8000)}
  else if(key==='laser'){P.laser=true;setTimeout(function(){P.laser=false},10000)}
  else if(key==='life'){lives=Math.min(lives+1,9);updateUI()}
}

// 粒子
function spawnP(x,y,col){for(var i=0;i<14;i++){var a=Math.random()*Math.PI*2,s=1+Math.random()*3.5;particles.push({x:x,y:y,dx:Math.cos(a)*s,dy:Math.sin(a)*s,life:45+Math.random()*30,col:col,sz:2+Math.random()*4})}}

// 开始
function start(d){
  isMobile=window.innerWidth<=850;
  diff=d;var cfg=CFG[d];
  lives=cfg.li;score=0;level=1;baseSp=cfg.sp;curSp=cfg.sp;
  P.w=110;P.laser=false;P.x=W/2-55;P.y=H-40;
  ball.stuck=true;ball.penetrate=false;ball.alive=true;extras=[];
  bricks=[];particles=[];pups=[];lasers=[];
  makeBricks();initBall();updateUI();
  menu.classList.add('hide');
  if(isMobile)tBar.classList.add('show');
  run=true;requestAnimationFrame(loop);
}

function gameOver(){run=false;saveBest();playSnd('dead');tBar.classList.remove('show');menu.querySelector('h1').textContent='💀 游戏结束';info.innerHTML='最终得分: <b style="color:#0ff;font-size:22px">'+score+'</b>';menu.classList.remove('hide')}
function winGame(){run=false;saveBest();playSnd('win');tBar.classList.remove('show');menu.querySelector('h1').textContent='🎉 全部通关！';info.innerHTML='最终得分: <b style="color:#0ff;font-size:22px">'+score+'</b>';menu.classList.remove('hide')}

// 主循环
function loop(){if(!run)return;update();draw();requestAnimationFrame(loop)}

// 更新
function update(){
  var spd=P.sp*sc;
  if(kL||tL)P.x-=spd;if(kR||tR)P.x+=spd;
  if(P.x<0)P.x=0;if(P.x+P.w>W)P.x=W-P.w;

  if(ball.stuck){ball.x=P.x+P.w/2;ball.y=P.y-ball.r-5}
  else{updateOneBall(ball)}

  for(var i=extras.length-1;i>=0;i--){updateOneBall(extras[i]);if(!extras[i].alive)extras.splice(i,1)}

  // 激光
  if(P.laser){laserCD--;if(laserCD<=0){lasers.push({x:P.x+P.w*0.25,y:P.y,w:3,h:14,dy:-9*sc});lasers.push({x:P.x+P.w*0.75,y:P.y,w:3,h:14,dy:-9*sc});laserCD=14}}
  for(var i=lasers.length-1;i>=0;i--){var l=lasers[i];l.y+=l.dy;if(l.y<0){lasers.splice(i,1);continue}for(var j=0;j<bricks.length;j++){var b=bricks[j];if(!b.alive)continue;if(l.x<b.x+b.w&&l.x+l.w>b.x&&l.y<b.y+b.h&&l.y+l.h>b.y){b.hp--;lasers.splice(i,1);if(b.hp<=0){b.alive=false;score+=10*b.maxHp;spawnP(b.x+b.w/2,b.y+b.h/2,b.col);tryDrop(b.x+b.w/2,b.y+b.h/2);updateUI()}break;}}}

  // 道具
  for(var i=pups.length-1;i>=0;i--){var p=pups[i];if(!p.alive){pups.splice(i,1);continue}p.y+=p.dy;if(p.y>P.y&&p.y<P.y+P.h&&p.x+p.w>P.x&&p.x<P.x+P.w){usePower(p.key);p.alive=false;continue}if(p.y>H+20)pups.splice(i,1)}

  // 粒子
  for(var i=particles.length-1;i>=0;i--){var p=particles[i];p.x+=p.dx;p.y+=p.dy;p.life--;if(p.life<=0)particles.splice(i,1)}

  // 主球死亡
  if(!ball.stuck&&!ball.alive&&extras.length===0){lives--;updateUI();if(lives<=0){gameOver();return}P.x=W/2-P.w/2;initBall()}

  // 通关
  if(bricks.every(function(b){return!b.alive})){if(level<5){level++;makeBricks();P.x=W/2-P.w/2;initBall();updateUI()}else{winGame();return}}
}

function updateOneBall(b){if(!b.alive)return;b.x+=b.dx;b.y+=b.dy;
  if(b.x-b.r<0){b.x=b.r;b.dx=-b.dx;playSnd('wall')}
  if(b.x+b.r>W){b.x=W-b.r;b.dx=-b.dx;playSnd('wall')}
  if(b.y-b.r<0){b.y=b.r;b.dy=-b.dy;playSnd('wall')}
  if(b.y-b.r>H){b.alive=false;return}
  // 挡板
  if(b.y+b.r>=P.y&&b.y-b.r<=P.y+P.h&&b.x>=P.x-6&&b.x<=P.x+P.w+6&&b.dy>0){
    var hit=(b.x-P.x)/P.w;
    var angle=-Math.PI/2+(hit-0.5)*Math.PI*0.7;
    angle=Math.max(angle,-Math.PI/2+0.28);angle=Math.min(angle,Math.PI/2-0.28);
    var s=Math.sqrt(b.dx*b.dx+b.dy*b.dy);b.dx=Math.cos(angle)*s;b.dy=Math.sin(angle)*s;b.y=P.y-b.r;
    spawnP(b.x,b.y,'#0ff');playSnd('paddle');
  }
  // 砖块
  for(var i=0;i<bricks.length;i++){var br=bricks[i];if(!br.alive)continue;if(b.x+b.r>br.x&&b.x-b.r<br.x+br.w&&b.y+b.r>br.y&&b.y-b.r<br.y+br.h){if(!b.penetrate){var ol=b.x+b.r-br.x,or=br.x+br.w-(b.x-b.r),ot=b.y+b.r-br.y,ob=br.y+br.h-(b.y-b.r);var mn=Math.min(ol,or,ot,ob);if(mn===ot||mn===ob)b.dy=-b.dy;else b.dx=-b.dx;}br.hp--;if(br.hp<=0){br.alive=false;score+=10*br.maxHp;spawnP(br.x+br.w/2,br.y+br.h/2,br.col);tryDrop(br.x+br.w/2,br.y+br.h/2);var dead=0;for(var k=0;k<bricks.length;k++)if(!bricks[k].alive)dead++;curSp=baseSp*(1+(dead/bricks.length)*1.5);if(curSp>baseSp*1.5)curSp=baseSp*1.5;updateUI();playSnd('brick');}if(!b.penetrate)break;}}
}

// 绘制
function draw(){
  ctx.fillStyle='#0a0a0a';ctx.fillRect(0,0,W,H);
  // 网格
  ctx.strokeStyle='#0ff';ctx.lineWidth=1;ctx.globalAlpha=0.05;
  for(var i=0;i<W;i+=40){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,H);ctx.stroke()}
  for(var i=0;i<H;i+=40){ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(W,i);ctx.stroke()}
  ctx.globalAlpha=1;

  // 砖块
  for(var i=0;i<bricks.length;i++){var b=bricks[i];if(!b.alive)continue;ctx.fillStyle=b.col;ctx.shadowBlur=8;ctx.shadowColor=b.col;ctx.fillRect(b.x,b.y,b.w,b.h);ctx.shadowBlur=0;if(b.maxHp>1){ctx.fillStyle='#fff';ctx.font='bold 13px monospace';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(b.hp,b.x+b.w/2,b.y+b.h/2);}}

  // 挡板
  ctx.shadowBlur=P.laser?20:14;ctx.shadowColor=P.laser?'#f44':'#0ff';ctx.fillStyle=P.laser?'#f64':'#0ff';ctx.fillRect(P.x,P.y,P.w,P.h);ctx.shadowBlur=0;
  if(P.laser){ctx.fillStyle='#f44';ctx.shadowBlur=10;ctx.shadowColor='#f44';ctx.fillRect(P.x+8,P.y-12,P.w-16,10);ctx.shadowBlur=0;}

  // 主球
  ctx.shadowBlur=10;ctx.shadowColor=ball.penetrate?'#ff0':'#fff';ctx.fillStyle=ball.penetrate?'#ff0':'#fff';ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;

  // 分裂球
  for(var i=0;i<extras.length;i++){var e=extras[i];if(!e.alive)continue;ctx.shadowBlur=8;ctx.shadowColor='#0ff';ctx.fillStyle='#0ff';ctx.beginPath();ctx.arc(e.x,e.y,e.r,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;}

  // 激光
  for(var i=0;i<lasers.length;i++){var l=lasers[i];ctx.fillStyle='#f44';ctx.shadowBlur=12;ctx.shadowColor='#f44';ctx.fillRect(l.x,l.y,l.w,l.h);ctx.shadowBlur=0;}

  // 道具
  for(var i=0;i<pups.length;i++){var p=pups[i];if(!p.alive)continue;ctx.fillStyle=p.color;ctx.globalAlpha=0.35;ctx.fillRect(p.x,p.y,p.w,p.h);ctx.globalAlpha=1;ctx.strokeStyle=p.color;ctx.lineWidth=2;ctx.strokeRect(p.x,p.y,p.w,p.h);ctx.fillStyle=p.color;ctx.font='bold 12px monospace';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(p.label,p.x+p.w/2,p.y+p.h/2);}

  // 粒子
  for(var i=0;i<particles.length;i++){var p=particles[i];ctx.fillStyle=p.col;ctx.globalAlpha=Math.max(0,p.life/60);ctx.beginPath();ctx.arc(p.x,p.y,p.sz,0,Math.PI*2);ctx.fill();}ctx.globalAlpha=1;

  // HUD
  ctx.fillStyle='#0ff';ctx.font='12px monospace';ctx.textAlign='left';ctx.textBaseline='top';
  var lbl={easy:'简单',normal:'中等',hard:'困难'};
  ctx.fillText('难度: '+(lbl[diff]||diff),8,8);
  if(ball.stuck&&run){ctx.textAlign='center';ctx.fillStyle='rgba(0,255,255,0.45)';ctx.font='16px monospace';ctx.fillText('点击发射球',W/2,H/2+50);}
  if(ball.penetrate){ctx.textAlign='right';ctx.fillStyle='#ff0';ctx.font='bold 13px monospace';ctx.fillText('⚡ 穿透',W-10,8)}
  if(curSp>baseSp*1.1){ctx.textAlign='right';ctx.fillStyle='#f80';ctx.font='12px monospace';ctx.fillText('⚡ 加速 x'+(curSp/baseSp).toFixed(1),W-10,24)}
}

// ========== 控制 ==========
// 键盘
document.onkeydown=function(e){if(e.key==='ArrowLeft'||e.key==='a'){kL=true;e.preventDefault()}if(e.key==='ArrowRight'||e.key==='d'){kR=true;e.preventDefault()}if((e.key===' '||e.key==='Enter')&&run&&ball.stuck){launchBall();e.preventDefault()}if((e.key===' '||e.key==='Enter')&&run&&P.laser){laserCD=0;e.preventDefault()}};
document.onkeyup=function(e){if(e.key==='ArrowLeft'||e.key==='a')kL=false;if(e.key==='ArrowRight'||e.key==='d')kR=false;};

// 鼠标
c.onmousemove=function(e){if(!run)return;var r=c.getBoundingClientRect();var sx=W/r.width;P.x=(e.clientX-r.left)*sx-P.w/2;if(P.x<0)P.x=0;if(P.x+P.w>W)P.x=W-P.w;};
c.onclick=function(){if(run&&ball.stuck)launchBall();else if(run&&P.laser)laserCD=0};

// ===== 触控系统（完全重写）=====
var isMobile=window.innerWidth<=850;

// 方法1：整块canvas触控滑动（主触控区）
var touchActive=false, touchLastX=0;
c.addEventListener('touchstart',function(e){e.preventDefault();if(!run)return;var t=e.touches[0];var r=c.getBoundingClientRect();var sx=W/r.width;touchLastX=(t.clientX-r.left)*sx;touchActive=true;if(ball.stuck)launchBall();},{passive:false});
c.addEventListener('touchmove',function(e){e.preventDefault();if(!run||!touchActive)return;var t=e.touches[0];var r=c.getBoundingClientRect();var sx=W/r.width;var cx=(t.clientX-r.left)*sx;P.x=cx-P.w/2;if(P.x<0)P.x=0;if(P.x+P.w>W)P.x=W-P.w;},{passive:false});
c.addEventListener('touchend',function(e){e.preventDefault();touchActive=false;},{passive:false});

// 方法2：底部控制栏按钮
var tFireDown=false;
document.getElementById('tLeft').addEventListener('touchstart',function(e){e.preventDefault();tL=true;},{passive:false});
document.getElementById('tLeft').addEventListener('touchend',function(e){e.preventDefault();tL=false;},{passive:false});
document.getElementById('tRight').addEventListener('touchstart',function(e){e.preventDefault();tR=true;},{passive:false});
document.getElementById('tRight').addEventListener('touchend',function(e){e.preventDefault();tR=false;},{passive:false});
document.getElementById('tFire').addEventListener('touchstart',function(e){e.preventDefault();if(run&&ball.stuck)launchBall();if(run&&P.laser)laserCD=0;},{passive:false});

// 阻止整个页面滚动
document.body.addEventListener('touchmove',function(e){if(e.target===c||c.contains(e.target))e.preventDefault()},{passive:false});

// 暴露全局函数
window.start=start;
updateUI();
})();
</script>
</body>
