<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>打砖块 - Zephyr</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#0f8;font-family:monospace;display:flex;flex-direction:column;align-items:center;min-height:100vh;overflow:hidden}
#bar{display:flex;justify-content:space-between;width:100%;max-width:820px;padding:8px 20px;font-size:17px;text-shadow:0 0 6px #0f8}
#bar span{color:#0f8;font-weight:bold}
#box{position:relative;margin-top:4px}
canvas{display:block;border:2px solid #0f8;box-shadow:0 0 18px #0f8;max-width:100vw}
#menu{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(10,10,10,0.96);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10}
#menu.h{display:none}
#menu h1{font-size:38px;margin-bottom:30px;text-shadow:0 0 20px #0f8;animation:pulse 2s ease-in-out infinite alternate}
@keyframes pulse{from{text-shadow:0 0 20px #0f8}to{text-shadow:0 0 40px #0f8,0 0 60px #0f8}}
#info{font-size:14px;margin-bottom:18px;color:#aaa;text-align:center;line-height:1.6}
.mb{background:transparent;color:#0f8;border:2px solid #0f8;padding:12px 35px;margin:7px;font-size:17px;cursor:pointer;font-family:monospace;display:block;width:210px;text-align:center}
.mb:hover{background:#0f8;color:#0a0a0a}
#btns{display:none;justify-content:space-between;width:100%;max-width:820px;padding:10px 20px;position:fixed;bottom:0;left:0;right:0;margin:0 auto}
.bb{background:rgba(0,255,136,.15);border:2px solid #0f8;color:#0f8;padding:16px 40px;font-size:24px;border-radius:8px;cursor:pointer;touch-action:manipulation}
.bb:active{background:rgba(0,255,136,.5)}
@media(max-width:850px){#btns{display:flex}#bar{font-size:14px;padding:6px 10px}}
</style>
</head>
<body>
<div id="bar"><div>分数: <span id="s0">0</span></div><div>生命: <span id="s1">3</span></div><div>关卡: <span id="s2">1</span></div><div>最高: <span id="s3">0</span></div></div>
<div id="box">
<canvas id="cv" width="800" height="600"></canvas>
<div id="menu">
<h1>⚡ 打砖块</h1>
<p id="tip">🎯 接住道具获得能力<br>␣ 空格/点击发射球</p>
<button class="mb" onclick="go('easy')">🌱 简单</button>
<button class="mb" onclick="go('normal')">⚡ 中等</button>
<button class="mb" onclick="go('hard')">💀 困难</button>
</div>
</div>
<div id="btns"><button class="bb" id="bl">◀</button><button class="bb" id="br">▶</button></div>

<script>
var cv=document.getElementById('cv'),cx=cv.getContext('2d'),W=800,H=600;
var s0=document.getElementById('s0'),s1=document.getElementById('s1');
var s2=document.getElementById('s2'),s3=document.getElementById('s3');
var menu=document.getElementById('menu'),tip=document.getElementById('tip');

// resize
function rz(){
  var mw=window.innerWidth-50,mh=window.innerHeight-200;
  var sc=Math.min(mw/800,mh/600,1);
  cv.style.width=(800*sc)+'px';cv.style.height=(600*sc)+'px';
  rz.scale=sc;
}
rz();window.onresize=rz;
var SC=function(){return rz.scale||1};

// state
var D={easy:{sp:4,li:3},normal:{sp:5.5,li:3},hard:{sp:7,li:2}};
var diff='easy',lives=3,score=0,level=1,run=false;
var bsp=4,sp=4;
var best=parseInt(localStorage.getItem('bbp')||'0');s3.textContent=best;
function sv(){if(score>best){best=score;localStorage.setItem('bbp',best);s3.textContent=best}}

// paddle
var P={x:0,y:0,w:120,h:14,bw:120,xs:0};P.y=H-40;
// ball
var B={x:0,y:0,dx:0,dy:0,r:8,st:true,pe:false,ex:[]};
// arrays
var brk=[],pts=[],pws=[],las=[];

var kL=false,kR=false,tL=false,tR=false,lc=0;

function ui(){s0.textContent=score;s1.textContent=lives;s2.textContent=level;sv()}

// --- bricks ---
function mkBrk(){
  brk=[];
  var cw=Math.floor((W-60)/10),ch=25,ox=30,oy=60;
  var cl=['#f34','#f80','#fc0','#0f8','#0cf','#a6f'];
  var ls=[0,1,2,3,4];
  var L=ls[Math.min(level-1,ls.length-1)];
  for(var r=0;r<6;r++)for(var c=0;c<10;c++){
    var add=false,hp=1;
    if(L===0) add=Math.random()<0.85;
    else if(L===1) add=(r+c)%2===0;
    else if(L===2) add=(r===0||r===5||c===0||c===9||Math.random()<0.4);
    else if(L===3){var d=Math.abs(r-2.5)+Math.abs(c-4.5);add=d<=3;hp=d<=1?3:d<=2?2:1}
    else if(L===4) add=true;
    if(add) brk.push({x:ox+c*(cw+2),y:oy+r*(ch+3),w:cw-2,h:ch,hp:hp,mx:hp,cl:cl[r%6],a:true});
  }
}

// --- ball ---
function bIn(){B.x=P.x+P.w/2;B.y=P.y-B.r-5;B.st=true;B.pe=false;B.ex=[]}
function bGo(){
  if(!B.st)return;
  B.st=false;
  var a=-Math.PI/2+(Math.random()-0.5)*0.5;
  var sp=sp*SC();
  B.dx=Math.cos(a)*sp;B.dy=Math.sin(a)*sp;
}

// --- powerups ---
var PWS=[
  {k:'w',l:'加长',c:'#0f8',ch:.2},
  {k:'s',l:'减速',c:'#0cf',ch:.15},
  {k:'m',l:'分裂',c:'#f0f',ch:.12},
  {k:'p',l:'穿透',c:'#ff0',ch:.12},
  {k:'l',l:'激光',c:'#f44',ch:.1},
  {k:'+',l:'+1命',c:'#f6f',ch:.1},
  {k:'n',l:'缩短',c:'#f80',ch:.06},
  {k:'f',l:'加速',c:'#f64',ch:.05}
];
function drop(x,y){
  if(Math.random()>.3)return;
  var t=0;PWS.forEach(function(p){t+=p.ch});
  var r=Math.random()*t,i=0;
  for(;i<PWS.length;i++){r-=PWS[i].ch;if(r<=0)break}
  var p=PWS[Math.min(i,PWS.length-1)];
  pws.push({x:x,y:y,k:p.k,l:p.l,c:p.c,w:75,h:20,dy:2.2*SC(),a:true});
}
function act(k){
  var S=SC();
  switch(k){
    case'w':P.w=P.bw*1.5;setTimeout(function(){P.w=P.bw},10000);break;
    case'n':P.w=Math.max(40,P.bw*0.6);setTimeout(function(){P.w=P.bw},5000);break;
    case's':sp=Math.max(bsp*0.5,sp*0.6);setTimeout(function(){sp=bsp},8000);break;
    case'f':sp=Math.min(bsp*1.5,sp*1.4);setTimeout(function(){sp=bsp},5000);break;
    case'm':
      if(B.ex.length<4)for(var i=0;i<2;i++){
        var a=(Math.random()-0.5)*Math.PI/3,s=sp*SC();
        B.ex.push({x:B.x,y:B.y,dx:Math.cos(a)*s,dy:Math.sin(a)*s-2,r:B.r,a:true});
      }
      break;
    case'p':B.pe=true;setTimeout(function(){B.pe=false},8000);break;
    case'l':P.lz=true;setTimeout(function(){P.lz=false},10000);break;
    case'+':lives=Math.min(lives+1,9);ui();break;
  }
}
function par(x,y,c,n){
  n=n||12;
  for(var i=0;i<n;i++){
    var a=Math.random()*Math.PI*2,s=1+Math.random()*4;
    pts.push({x:x,y:y,dx:Math.cos(a)*s,dy:Math.sin(a)*s,li:50+Math.random()*30,c:c,sz:2+Math.random()*4});
  }
}

// --- start ---
function go(d){
  diff=d;var c=D[d];
  lives=c.li;score=0;level=1;bsp=c.sp;sp=c.sp;
  P.w=P.bw;P.lz=false;P.x=W/2-P.w/2;
  B.ex=[];B.st=true;B.pe=false;B.x=P.x+P.w/2;B.y=P.y-B.r-5;
  brk=[];pts=[];pws=[];las=[];
  mkBrk();ui();
  menu.classList.add('h');run=true;loop();
}

// --- game over ---
function over(){
  run=false;sv();
  menu.querySelector('h1').textContent='游戏结束';
  tip.innerHTML='得分: <b style="font-size:22px">'+score+'</b>';
  menu.classList.remove('h');
}
function win(){
  run=false;sv();
  menu.querySelector('h1').textContent='🎉 全部通关';
  tip.innerHTML='最终得分: <b style="font-size:22px">'+score+'</b>';
  menu.classList.remove('h');
}

// --- update ball ---
function upB(b){
  if(!b.a)return;
  b.x+=b.dx;b.y+=b.dy;
  if(b.x-b.r<0){b.x=b.r;b.dx=-b.dx}
  if(b.x+b.r>W){b.x=W-b.r;b.dx=-b.dx}
  if(b.y-b.r<0){b.y=b.r;b.dy=-b.dy}
  if(b.y+b.r>H+10){b.a=false;return}
  // paddle
  if(b.y+b.r>=P.y&&b.y-b.r<=P.y+P.h&&b.x>=P.x-5&&b.x<=P.x+P.w+5&&b.dy>0){
    var hp=(b.x-P.x)/P.w;
    var a=-Math.PI/2+(hp-0.5)*Math.PI*0.7;
    a=Math.max(a,-Math.PI/2+0.3);a=Math.min(a,Math.PI/2-0.3);
    var s=Math.sqrt(b.dx*b.dx+b.dy*b.dy);
    b.dx=Math.cos(a)*s;b.dy=Math.sin(a)*s;
    b.y=P.y-b.r;par(b.x,b.y,'#0f8',5);
  }
  // bricks
  for(var i=0;i<brk.length;i++){
    var r=brk[i];if(!r.a)continue;
    if(b.x+b.r>r.x&&b.x-b.r<r.x+r.w&&b.y+b.r>r.y&&b.y-b.r<r.y+r.h){
      if(!b.pe){
        var ol=b.x+b.r-b.x,or=r.x+r.w-(b.x-b.r);
        var ot=b.y+b.r-b.y,ob=r.y+r.h-(b.y-b.r);
        var mn=Math.min(ol,or,ot,ob);
        if(mn===ot||mn===ob)b.dy=-b.dy;else b.dx=-b.dx;
      }
      r.hp--;
      if(r.hp<=0){
        r.a=false;score+=10*r.mx;
        par(r.x+r.w/2,r.y+r.h/2,r.cl);
        drop(r.x+r.w/2,r.y+r.h/2);
        var dead=brk.filter(function(b){return!b.a}).length;
        var tot=brk.length;
        if(tot>0)sp=bsp*(1+(dead/tot)*1.5);
        sp=Math.min(sp,D[diff].sp*1.5);ui();
      }
      if(!b.pe)break;
    }
  }
}

// --- update ---
function up(){
  if(!run)return;
  // paddle move
  var s=P.xs*SC();
  if(kL||tL)P.x-=s;if(kR||tR)P.x+=s;
  if(P.x<0)P.x=0;if(P.x+P.w>W)P.x=W-P.w;
  // ball stuck
  if(B.st){B.x=P.x+P.w/2;B.y=P.y-B.r-5}else{upB(B)}
  // extra balls
  for(var i=B.ex.length-1;i>=0;i--){upB(B.ex[i]);if(!B.ex[i].a)B.ex.splice(i,1)}
  // laser
  if(P.lz){
    lc--;
    if(lc<=0){
      las.push({x:P.x+P.w*0.3-2,y:P.y,h:15,w:4,dy:-9*SC()});
      las.push({x:P.x+P.w*0.7-2,y:P.y,h:15,w:4,dy:-9*SC()});
      lc=12;
    }
  }
  for(var i=las.length-1;i>=0;i--){
    var l=las[i];l.y+=l.dy;
    if(l.y<0){las.splice(i,1);continue}
    for(var j=0;j<brk.length;j++){
      var b=brk[j];if(!b.a)continue;
      if(l.x<b.x+b.w&&l.x+l.w>b.x&&l.y<b.y+b.h&&l.y+l.h>b.y){
        b.hp--;las.splice(i,1);
        if(b.hp<=0){b.a=false;score+=10*b.mx;par(b.x+b.w/2,b.y+b.h/2,b.cl);drop(b.x+b.w/2,b.y+b.h/2);ui()}
        break;
      }
    }
  }
  // powerups
  for(var i=pws.length-1;i>=0;i--){
    var p=pws[i];if(!p.a){pws.splice(i,1);continue}
    p.y+=p.dy;
    if(p.y+p.h>P.y&&p.y<P.y+P.h&&p.x+p.w>P.x&&p.x<P.x+P.w){act(p.k);p.a=false;continue}
    if(p.y>H+20)pws.splice(i,1);
  }
  // particles
  for(var i=pts.length-1;i>=0;i--){var p=pts[i];p.x+=p.dx;p.y+=p.dy;p.li--;if(p.li<=0)pts.splice(i,1)}
  // life check
  if(!B.st&&!B.a&&B.ex.length===0){
    lives--;ui();
    if(lives<=0){over();return}
    P.x=W/2-P.w/2;bIn();
  }
  // level check
  if(brk.every(function(b){return!b.a})){
    if(level<5){level++;mkBrk();P.x=W/2-P.w/2;bIn();ui()}
    else{win();return}
  }
}

// --- draw ---
function draw(){
  cx.fillStyle='#0a0a0a';cx.fillRect(0,0,W,H);
  // grid
  cx.strokeStyle='#0f8';cx.lineWidth=1;cx.globalAlpha=0.06;
  for(var i=0;i<W;i+=40){cx.beginPath();cx.moveTo(i,0);cx.lineTo(i,H);cx.stroke()}
  for(var i=0;i<H;i+=40){cx.beginPath();cx.moveTo(0,i);cx.lineTo(W,i);cx.stroke()}
  cx.globalAlpha=1;
  // bricks
  brk.forEach(function(b){
    if(!b.a)return;
    cx.fillStyle=b.cl;cx.shadowBlur=8;cx.shadowColor=b.cl;
    cx.fillRect(b.x,b.y,b.w,b.h);
    cx.shadowBlur=0;
    if(b.mx>1){
      cx.fillStyle='#fff';cx.font='bold '+(13*SC())+'px monospace';
      cx.textAlign='center';cx.textBaseline='middle';
      cx.fillText(b.hp,b.x+b.w/2,b.y+b.h/2);
    }
  });
  // paddle
  cx.shadowBlur=14;cx.shadowColor='#0f8';
  cx.fillStyle=P.lz?'#f64':'#0f8';
  cx.fillRect(P.x,P.y,P.w,P.h);cx.shadowBlur=0;
  // ball
  cx.shadowBlur=10;cx.shadowColor=B.pe?'#ff0':'#fff';
  cx.fillStyle=B.pe?'#ff0':'#fff';
  cx.beginPath();cx.arc(B.x,B.y,B.r,0,Math.PI*2);cx.fill();cx.shadowBlur=0;
  // extra balls
  B.ex.forEach(function(b){
    cx.shadowBlur=8;cx.shadowColor='#0ff';cx.fillStyle='#0ff';
    cx.beginPath();cx.arc(b.x,b.y,b.r,0,Math.PI*2);cx.fill();cx.shadowBlur=0;
  });
  // lasers
  las.forEach(function(l){
    cx.fillStyle='#f44';cx.shadowBlur=10;cx.shadowColor='#f44';
    cx.fillRect(l.x,l.y,l.w,l.h);cx.shadowBlur=0;
  });
  // powerups
  pws.forEach(function(p){
    cx.fillStyle=p.c;cx.globalAlpha=0.3;
    cx.fillRect(p.x-1,p.y-1,p.w+2,p.h+2);cx.globalAlpha=1;
    cx.strokeStyle=p.c;cx.lineWidth=2;cx.strokeRect(p.x-1,p.y-1,p.w+2,p.h+2);
    cx.fillStyle=p.c;cx.font=(12*SC())+'px monospace';cx.textAlign='center';cx.textBaseline='middle';
    cx.fillText(p.l,p.x+p.w/2,p.y+p.h/2);
  });
  // particles
  pts.forEach(function(p){
    cx.fillStyle=p.c;cx.globalAlpha=Math.max(0,p.li/60);
    cx.beginPath();cx.arc(p.x,p.y,p.sz,0,Math.PI*2);cx.fill();
  });
  cx.globalAlpha=1;
  // texts
  cx.fillStyle='#0f8';cx.font=(12*SC())+'px monospace';cx.textAlign='left';cx.textBaseline='top';
  cx.fillText(D[diff].lbl||diff,8,8);
  if(B.st&&run){
    cx.textAlign='center';cx.fillStyle='rgba(0,255,136,.5)';cx.font=(16*SC())+'px monospace';
    cx.fillText('点击/空格发射球',W/2,H/2+40);
  }
  if(B.pe){cx.textAlign='right';cx.fillStyle='#ff0';cx.font='bold '+(13*SC())+'px monospace';cx.fillText('⚡穿透',W-10,8)}
  if(sp>bsp*1.1){cx.textAlign='right';cx.fillStyle='#f80';cx.font=(12*SC())+'px monospace';cx.fillText('⚡加速',W-10,26)}
}
// --- fix: no 'next' label in diff objects, make sure:
D.easy.lbl='简单';D.normal.lbl='中等';D.hard.lbl='困难';

function loop(){if(!run)return;up();draw();requestAnimationFrame(loop)}

// --- controls ---
document.onkeydown=function(e){
  if(e.key==='ArrowLeft'||e.key==='a'){kL=true;e.preventDefault()}
  if(e.key==='ArrowRight'||e.key==='d'){kR=true;e.preventDefault()}
  if(e.key===' '||e.key==='Enter'){e.preventDefault();if(B.st&&run)bGo();else if(P.lz&&run)lc=0}
};
document.onkeyup=function(e){
  if(e.key==='ArrowLeft'||e.key==='a')kL=false;
  if(e.key==='ArrowRight'||e.key==='d')kR=false;
};
cv.onmousemove=function(e){
  var r=cv.getBoundingClientRect();var sx=W/r.width;
  P.x=(e.clientX-r.left)*sx-P.w/2;
  if(P.x<0)P.x=0;if(P.x+P.w>W)P.x=W-P.w;
};
cv.onclick=function(){if(run&&B.st)bGo();else if(run&&P.lz)lc=0};
cv.ontouchmove=function(e){e.preventDefault();
  var r=cv.getBoundingClientRect();var sx=W/r.width;
  P.x=(e.touches[0].clientX-r.left)*sx-P.w/2;
  if(P.x<0)P.x=0;if(P.x+P.w>W)P.x=W-P.w;
};
document.getElementById('bl').ontouchstart=function(e){e.preventDefault();tL=true};
document.getElementById('bl').ontouchend=function(){tL=false};
document.getElementById('br').ontouchstart=function(e){e.preventDefault();tR=true};
document.getElementById('br').ontouchend=function(){tR=false};

ui();
</script>
</body>
</html>
