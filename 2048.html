<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>2048 - Zephyr</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        /* 顶部栏 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .title {
            font-size: 48px;
            font-weight: 900;
            background: linear-gradient(135deg, #00ff88, #00ccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0,255,136,0.3);
        }

        .scores {
            display: flex;
            gap: 10px;
        }

        .score-box {
            background: #1a1a1a;
            border: 1px solid #00ff88;
            border-radius: 8px;
            padding: 8px 16px;
            text-align: center;
            min-width: 80px;
        }

        .score-box .label {
            font-size: 11px;
            color: #00ff88;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .score-box .value {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
        }

        /* 控制栏 */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .subtitle {
            color: #888;
            font-size: 14px;
        }

        .btn {
            background: #1a1a1a;
            border: 1px solid #333;
            color: #e0e0e0;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .btn:hover {
            border-color: #00ff88;
            color: #00ff88;
            box-shadow: 0 0 10px rgba(0,255,136,0.2);
        }

        /* 游戏面板 */
        .board {
            background: #1a1a2e;
            border: 2px solid #00ff88;
            border-radius: 12px;
            padding: 12px;
            position: relative;
            box-shadow: 0 0 30px rgba(0,255,136,0.1);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .cell {
            aspect-ratio: 1;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            border: 1px solid rgba(0,255,136,0.1);
        }

        /* 方块层 */
        .tile-layer {
            position: absolute;
            top: 12px;
            left: 12px;
            right: 12px;
            bottom: 12px;
            pointer-events: none;
        }

        .tile {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-weight: 700;
            transition: all 0.12s ease;
            z-index: 10;
        }

        .tile.new {
            animation: pop 0.2s ease;
        }

        .tile.merged {
            animation: merge 0.2s ease;
            z-index: 20;
        }

        @keyframes pop {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes merge {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        /* 方块颜色 */
        .tile-2    { background: #1e1e1e; color: #e0e0e0; box-shadow: 0 0 8px rgba(0,255,136,0.1); }
        .tile-4    { background: #1a2e1a; color: #00ff88; box-shadow: 0 0 10px rgba(0,255,136,0.2); }
        .tile-8    { background: #1a2e2e; color: #00ccff; box-shadow: 0 0 12px rgba(0,204,255,0.3); }
        .tile-16   { background: #1a1a3e; color: #aa88ff; box-shadow: 0 0 14px rgba(170,136,255,0.3); }
        .tile-32   { background: #2e1a2e; color: #ff66cc; box-shadow: 0 0 16px rgba(255,102,204,0.3); }
        .tile-64   { background: #2e1a1a; color: #ff4444; box-shadow: 0 0 18px rgba(255,68,68,0.3); }
        .tile-128  { background: #2e2e1a; color: #ffaa00; box-shadow: 0 0 20px rgba(255,170,0,0.4); font-size: 28px; }
        .tile-256  { background: #1a2e1a; color: #00ff88; box-shadow: 0 0 22px rgba(0,255,136,0.5); font-size: 28px; }
        .tile-512  { background: #1a1a3e; color: #00ccff; box-shadow: 0 0 24px rgba(0,204,255,0.5); font-size: 28px; }
        .tile-1024 { background: #2e1a3e; color: #ff66cc; box-shadow: 0 0 26px rgba(255,102,204,0.6); font-size: 22px; }
        .tile-2048 { background: linear-gradient(135deg, #00ff88, #00ccff); color: #0a0a0a; box-shadow: 0 0 30px rgba(0,255,136,0.8); font-size: 22px; }

        /* 游戏结束/胜利遮罩 */
        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            border-radius: 10px;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .overlay.show {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .overlay h2 {
            font-size: 36px;
            margin-bottom: 10px;
        }

        .overlay .final-score {
            color: #00ff88;
            font-size: 18px;
            margin-bottom: 20px;
        }

        .overlay .btn {
            font-size: 16px;
            padding: 10px 30px;
        }

        /* 底部提示 */
        .tips {
            text-align: center;
            margin-top: 15px;
            color: #555;
            font-size: 13px;
        }

        /* 移动端 */
        @media (max-width: 520px) {
            .container { padding: 10px; }
            .title { font-size: 36px; }
            .board { padding: 8px; }
            .grid { gap: 6px; }
            .tile-128, .tile-256, .tile-512 { font-size: 20px; }
            .tile-1024, .tile-2048 { font-size: 16px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">2048</div>
            <div class="scores">
                <div class="score-box">
                    <div class="label">分数</div>
                    <div class="value" id="score">0</div>
                </div>
                <div class="score-box">
                    <div class="label">最高</div>
                    <div class="value" id="best">0</div>
                </div>
            </div>
        </div>

        <div class="controls">
            <div class="subtitle">合并方块，挑战2048！</div>
            <button class="btn" onclick="newGame()">🔄 新游戏</button>
        </div>

        <div class="board" id="board">
            <div class="grid" id="grid"></div>
            <div class="tile-layer" id="tileLayer"></div>

            <div class="overlay" id="overlay">
                <h2 id="overlayTitle">游戏结束</h2>
                <div class="final-score" id="finalScore"></div>
                <button class="btn" onclick="newGame()">再来一局</button>
            </div>
        </div>

        <div class="tips">
            ⌨️ 方向键 / 📱 滑动屏幕
        </div>
    </div>

    <script>
        const SIZE = 4;
        let grid = [];
        let score = 0;
        let best = parseInt(localStorage.getItem('2048_best') || '0');
        let moving = false;
        let won = false;

        const $score = document.getElementById('score');
        const $best = document.getElementById('best');
        const $grid = document.getElementById('grid');
        const $tileLayer = document.getElementById('tileLayer');
        const $overlay = document.getElementById('overlay');
        const $overlayTitle = document.getElementById('overlayTitle');
        const $finalScore = document.getElementById('finalScore');

        // 初始化网格背景
        function initGrid() {
            $grid.innerHTML = '';
            for (let i = 0; i < SIZE * SIZE; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                $grid.appendChild(cell);
            }
        }

        function newGame() {
            grid = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
            score = 0;
            won = false;
            moving = false;
            $overlay.classList.remove('show');
            updateScore();
            addRandom();
            addRandom();
            renderTiles();
        }

        function addRandom() {
            const empty = [];
            for (let r = 0; r < SIZE; r++)
                for (let c = 0; c < SIZE; c++)
                    if (grid[r][c] === 0) empty.push([r, c]);
            if (empty.length === 0) return null;
            const [r, c] = empty[Math.floor(Math.random() * empty.length)];
            grid[r][c] = Math.random() < 0.9 ? 2 : 4;
            return [r, c];
        }

        function updateScore() {
            $score.textContent = score;
            if (score > best) {
                best = score;
                localStorage.setItem('2048_best', best);
            }
            $best.textContent = best;
        }

        function renderTiles() {
            $tileLayer.innerHTML = '';
            const board = document.getElementById('board');
            const boardW = board.clientWidth - 24; // padding
            const gap = window.innerWidth <= 520 ? 6 : 10;
            const pad = window.innerWidth <= 520 ? 8 : 12;
            const cellSize = (boardW - gap * (SIZE + 1)) / SIZE;

            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    const val = grid[r][c];
                    if (val === 0) continue;
                    const tile = document.createElement('div');
                    const x = pad + c * (cellSize + gap);
                    const y = pad + r * (cellSize + gap);
                    tile.style.cssText = `
                        width:${cellSize}px; height:${cellSize}px;
                        left:${x}px; top:${y}px;
                        font-size:${cellSize > 70 ? 32 : 22}px;
                    `;
                    tile.className = `tile tile-${val}`;
                    tile.textContent = val;
                    $tileLayer.appendChild(tile);
                }
            }
        }

        // 核心移动逻辑
        function move(dir) {
            if (moving) return false;
            const old = grid.map(row => [...row]);
            let moved = false;

            // 旋转网格，统一向左处理
            function rotate(arr, times) {
                let g = arr.map(row => [...row]);
                for (let t = 0; t < times; t++) {
                    const ng = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
                    for (let r = 0; r < SIZE; r++)
                        for (let c = 0; c < SIZE; c++)
                            ng[r][c] = g[c][SIZE - 1 - r];
                    g = ng;
                }
                return g;
            }

            let rotations = { left: 0, up: 1, right: 2, down: 3 }[dir];
            let g = rotate(grid, rotations);

            // 向左移动
            for (let r = 0; r < SIZE; r++) {
                let line = g[r].filter(v => v !== 0);
                let newLine = [];
                for (let i = 0; i < line.length; i++) {
                    if (i + 1 < line.length && line[i] === line[i + 1]) {
                        const merged = line[i] * 2;
                        newLine.push(merged);
                        score += merged;
                        i++; // 跳过下一个
                    } else {
                        newLine.push(line[i]);
                    }
                }
                while (newLine.length < SIZE) newLine.push(0);
                g[r] = newLine;
            }

            // 旋转回来
            grid = rotate(g, (4 - rotations) % 4);

            // 检查是否有变化
            for (let r = 0; r < SIZE; r++)
                for (let c = 0; c < SIZE; c++)
                    if (grid[r][c] !== old[r][c]) moved = true;

            if (moved) {
                moving = true;
                updateScore();
                const pos = addRandom();
                renderTiles();
                // 标记新方块
                if (pos) {
                    const tiles = $tileLayer.querySelectorAll('.tile');
                    const lastTile = tiles[tiles.length - 1];
                    if (lastTile) lastTile.classList.add('new');
                }
                setTimeout(() => {
                    moving = false;
                    checkGameState();
                }, 150);
            }

            return moved;
        }

        function checkGameState() {
            // 检查是否达到2048
            for (let r = 0; r < SIZE; r++)
                for (let c = 0; c < SIZE; c++)
                    if (grid[r][c] === 2048 && !won) {
                        won = true;
                        $overlayTitle.textContent = '🎉 恭喜！';
                        $finalScore.textContent = `分数: ${score}  |  继续挑战更高数字！`;
                        $overlay.classList.add('show');
                        // 不结束，允许继续
                        setTimeout(() => $overlay.classList.remove('show'), 3000);
                    }

            // 检查是否还有空位
            for (let r = 0; r < SIZE; r++)
                for (let c = 0; c < SIZE; c++)
                    if (grid[r][c] === 0) return;

            // 检查是否还能合并
            for (let r = 0; r < SIZE; r++)
                for (let c = 0; c < SIZE; c++) {
                    const v = grid[r][c];
                    if (c + 1 < SIZE && grid[r][c + 1] === v) return;
                    if (r + 1 < SIZE && grid[r + 1][c] === v) return;
                }

            // 游戏结束
            $overlayTitle.textContent = '游戏结束';
            $finalScore.textContent = `最终分数: ${score}`;
            $overlay.classList.add('show');
        }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            const map = {
                ArrowLeft: 'left', ArrowUp: 'up',
                ArrowRight: 'right', ArrowDown: 'down',
                a: 'left', w: 'up', d: 'right', s: 'down'
            };
            if (map[e.key]) {
                e.preventDefault();
                move(map[e.key]);
            }
        });

        // 触摸滑动
        let touchStartX, touchStartY;
        const board = document.getElementById('board');

        board.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: true });

        board.addEventListener('touchend', (e) => {
            if (!touchStartX) return;
            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            const absDx = Math.abs(dx);
            const absDy = Math.abs(dy);

            if (Math.max(absDx, absDy) < 30) return;

            if (absDx > absDy) {
                move(dx > 0 ? 'right' : 'left');
            } else {
                move(dy > 0 ? 'down' : 'up');
            }
            touchStartX = touchStartY = null;
        }, { passive: true });

        // 窗口大小变化时重绘
        window.addEventListener('resize', renderTiles);

        // 启动
        initGrid();
        $best.textContent = best;
        newGame();
    </script>
</body>
</html>
